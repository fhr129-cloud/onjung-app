<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>온정 F&B · 업로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
 --bg:#f0f0ee;--card:#fff;--border:#e8e8e4;--border2:#e0e0dc;
 --text1:#1a1a18;--text2:#555;--text3:#888;--text4:#aaa;
 --blue:#185FA5;--blue-dark:#0C447C;--blue-light:#E6F1FB;--blue-border:#B5D4F4;
 --red:#A32D2D;--red-light:#FCEBEB;--red-border:#F7C1C1;
 --amber:#854F0B;--amber-light:#FAEEDA;--amber-border:#FAC775;
 --green:#3B6D11;--green-light:#EAF3DE;--green-border:#C0DD97;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;font-size:14px;}

/* ── 홈 ── */
#home-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;}
.home-logo{display:flex;align-items:center;gap:8px;font-size:26px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.home-logo i{font-size:28px;}
.home-sub{font-size:13px;color:var(--text4);margin-bottom:36px;}
.home-menu{display:flex;flex-direction:column;gap:12px;width:100%;max-width:440px;}
.home-btn{position:relative;background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:18px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:box-shadow .15s,transform .15s;text-align:left;font-family:inherit;}
.home-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px);}
.home-ic{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.home-ic.blue{background:var(--blue-light);color:var(--blue);}
.home-ic.amber{background:var(--amber-light);color:var(--amber);}
.home-ic.slate{background:#EEF0F2;color:#48566B;}
.home-tw{flex:1;min-width:0;}
.home-tw .lbl{font-size:15px;font-weight:600;}
.home-tw .desc{font-size:12px;color:var(--text3);margin-top:2px;}
.home-btn .chev{font-size:18px;color:var(--text4);flex-shrink:0;}
.home-badge{position:absolute;top:12px;right:40px;background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center;display:none;align-items:center;justify-content:center;}

/* ── 앱 화면 ── */
#screen{display:none;flex-direction:column;min-height:100vh;max-width:960px;margin:0 auto;width:100%;}
.top-bar{height:52px;background:var(--card);border-bottom:.5px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:200;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;font-family:inherit;}
.back-btn i{font-size:17px;}
.top-bar h2{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.screen-body{padding:18px 20px;}
.section{display:none;}

/* ── 버튼 ── */
.btn-primary,.btn-secondary,.btn-green,.btn-red{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:9px;border:.5px solid var(--blue);background:var(--blue);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-primary:disabled{background:#bcd0e4;border-color:#bcd0e4;cursor:default;}
.btn-secondary{background:#fff;color:var(--text2);border-color:#ccc;}
.btn-secondary:hover{background:#f5f5f3;}
.btn-green{background:var(--green);border-color:var(--green);}
.btn-red{background:var(--red);border-color:var(--red);}

.field-label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;}
.required{color:var(--red);}
.sub-hint{font-size:12px;color:var(--text4);margin-top:6px;}
.form-group{margin-bottom:16px;}
select,input[type=date],input[type=time],input[type=text],input[type=number],input[type=password],textarea{padding:9px 11px;border:.5px solid #ccc;border-radius:9px;font-size:14px;font-family:inherit;width:100%;background:#fff;color:var(--text1);}
textarea{resize:vertical;min-height:64px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.static-field{min-height:42px;padding:9px 11px;border:.5px solid var(--border2);border-radius:9px;background:#fafaf8;color:var(--text1);font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;}
.fs-pin{color:var(--blue);font-size:16px;}

.empty{text-align:center;padding:34px 16px;color:var(--text4);font-size:13px;}
.section-title{font-size:13px;font-weight:600;color:var(--text1);margin:22px 0 12px;}

/* ── 사업장 선택 ── */
.pick-title{font-size:16px;font-weight:600;margin:4px 0 14px;}
.site-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.site-pick{display:flex;align-items:center;gap:12px;padding:15px 14px;border:.5px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;font-family:inherit;text-align:left;transition:transform .12s,border-color .15s,box-shadow .15s;}
.site-pick:hover{border-color:var(--blue);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.site-pick:active{transform:scale(.97);}
.sp-icon{width:38px;height:38px;border-radius:10px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.sp-name{font-size:14px;font-weight:500;line-height:1.3;}

/* ── 현재 사업장 바 ── */
.site-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border:.5px solid var(--border);border-radius:11px;background:var(--card);margin-bottom:14px;}
.sb-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;}
.sb-left i{color:var(--blue);font-size:17px;}
.site-change{background:#fff;border:.5px solid #ccc;border-radius:8px;padding:6px 13px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;}

/* ── 아코디언 ── */
.acc{background:var(--card);border:.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc-head{width:100%;display:flex;align-items:center;gap:12px;padding:15px 16px;background:none;border:none;cursor:pointer;font-family:inherit;}
.acc-icon{width:38px;height:38px;border-radius:10px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.acc-tw{flex:1;text-align:left;min-width:0;}
.acc-name{font-size:15px;font-weight:600;display:block;}
.acc-count{font-size:12px;color:var(--text4);}
.acc-chev{font-size:18px;color:var(--text4);transition:transform .2s;flex-shrink:0;}
.acc.open .acc-chev{transform:rotate(180deg);}
.acc-body{display:none;border-top:.5px solid var(--border);}
.acc.open .acc-body{display:block;}
.dl-badge{min-width:20px;height:20px;padding:0 6px;margin-right:2px;border-radius:99px;background:var(--red);color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-grid{display:flex;flex-direction:column;gap:8px;padding:10px 14px 14px;}
.grid-item{display:flex;align-items:center;gap:12px;padding:13px 14px;border:.5px solid var(--border2);border-radius:11px;background:#fafaf8;cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s,background .15s;width:100%;}
.grid-item:hover{border-color:var(--blue);background:#fff;}
.gi-icon{width:34px;height:34px;border-radius:9px;background:#fff;border:.5px solid var(--border);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.gi-tw{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
.gi-label{font-size:14px;font-weight:500;}
.gi-dl{align-self:flex-start;font-size:11px;font-weight:600;color:#fff;background:var(--red);padding:2px 8px;border-radius:99px;}
.gi-arrow{color:var(--text4);font-size:16px;flex-shrink:0;}
.grid-item.soon{cursor:default;opacity:.6;}
.grid-item.soon:hover{border-color:var(--border2);background:#fafaf8;}
.gi-soon{font-size:11px;color:var(--text4);background:#eee;padding:2px 8px;border-radius:99px;flex-shrink:0;}

/* ── 업로드 헤더 ── */
.form-hero{display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.fh-icon{width:46px;height:46px;border-radius:12px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;}
.fh-title{font-size:18px;font-weight:600;}
.fh-sub{font-size:12px;color:var(--text4);margin-top:1px;}

/* ── 마감 배너 ── */
.deadline-banner{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-radius:10px;background:#fafaf8;border:.5px solid var(--border);font-size:13px;color:var(--text2);margin-bottom:14px;}
.deadline-banner:empty{display:none;}
.dl-pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;}
.dl-done{background:var(--green-light);color:var(--green);}
.dl-late{background:var(--red-light);color:var(--red);}
.dl-soon{background:var(--amber-light);color:var(--amber);}
.dl-open{background:var(--blue-light);color:var(--blue);}

/* ── 슬롯 ── */
.slot-row{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.slot-row.done{background:#fafdf8;border-color:var(--green-border);}
.slot-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.slot-name{font-size:14px;font-weight:600;}
.badge-done{font-size:11px;font-weight:600;color:var(--green);}
.btn-upload{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border:1px dashed var(--blue-border);border-radius:10px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;}
.btn-upload.has{border-style:solid;}
.btn-upload input{display:none;}
.thumb{max-width:120px;max-height:120px;border-radius:8px;margin-top:8px;cursor:pointer;border:.5px solid var(--border);}
.file-line{font-size:13px;color:var(--text2);}
.file-line a{color:var(--blue);}
.form-fields{display:flex;flex-direction:column;gap:8px;}
.submit-wrap{margin-top:6px;}
.btn-submit{width:100%;padding:13px;border-radius:11px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-submit:disabled{background:#bcd0e4;cursor:default;}

/* ── 결재 카드 ── */
.appr-card{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.appr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.appr-title{font-size:14px;font-weight:600;}
.appr-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.appr-amt{font-size:14px;font-weight:600;color:var(--blue);white-space:nowrap;}
.appr-reason{font-size:13px;color:var(--text2);background:#fafaf8;border-radius:8px;padding:8px 10px;margin-top:10px;}
.appr-actions{display:flex;gap:8px;margin-top:12px;}
.appr-actions button{flex:1;}
.status-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;}
.st-approved{background:var(--green-light);color:var(--green);}
.st-rejected{background:var(--red-light);color:var(--red);}
.st-pending{background:var(--amber-light);color:var(--amber);}

/* ── 잠금 ── */
.lock-box{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:22px;max-width:360px;margin:30px auto;}

/* ── 관리자 현황 ── */
.admin-controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.admin-controls input[type=date]{width:auto;}
.grid-wrap{overflow-x:auto;border:.5px solid var(--border);border-radius:12px;background:var(--card);}
.matrix{border-collapse:collapse;font-size:12px;width:100%;}
.matrix th,.matrix td{border:.5px solid var(--border);padding:7px 6px;text-align:center;white-space:nowrap;}
.matrix th{background:#fafaf8;font-weight:500;color:var(--text2);position:sticky;top:0;}
.matrix th.site,.matrix td.site{text-align:left;position:sticky;left:0;background:#fafaf8;font-weight:500;z-index:1;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
.cell{cursor:pointer;font-weight:600;}
.cell-done{background:var(--green-light);color:var(--green);}
.cell-part{background:var(--amber-light);color:var(--amber);}
.cell-late{background:var(--red-light);color:var(--red);}
.cell-none{color:var(--text4);}
.cell-na{color:#ccc;}
.setting-block{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.dl-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0ec;}
.dl-row:last-child{border-bottom:none;}
.dl-row .nm{font-size:13px;font-weight:500;}
.dl-row input[type=time]{width:auto;}
.dl-row input[type=number]{width:90px;}
.dl-item{padding:11px 0;border-bottom:.5px solid #f0f0ec;}
.dl-item:last-child{border-bottom:none;}
.dl-item-name{font-size:13px;font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dl-item-grp{font-size:11px;color:var(--text4);font-weight:400;}
.dl-item-ctl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.dl-item-ctl input[type=date]{width:auto;flex:1;min-width:140px;}
.dl-item-ctl select,.dl-item-ctl input[type=time]{width:auto;}

/* ── 오버레이 ── */
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.78);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:950;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
.img-modal.open{display:flex;}
.img-modal img{max-width:100%;max-height:100%;border-radius:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1a18;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}

@media(max-width:600px){
 .screen-body{padding:14px 16px;}
 .site-grid{grid-template-columns:1fr;}
 .two-col{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ===== 홈 ===== -->
<div id="home-screen">
  <div class="home-logo"><i class="ti ti-cloud-upload"></i> 온정 F&amp;B</div>
  <div class="home-sub">사업장 문서 업로드 시스템</div>
  <div class="home-menu">
    <button class="home-btn" onclick="openSubmit()">
      <span class="home-ic blue"><i class="ti ti-upload"></i></span>
      <span class="home-tw"><span class="lbl">영양사 업로드</span><span class="desc">담당 사업장 문서 제출</span></span>
      <i class="ti ti-chevron-right chev"></i>
    </button>
    <button class="home-btn" onclick="openAdmin()">
      <span class="home-ic amber"><i class="ti ti-layout-dashboard"></i></span>
      <span class="home-tw"><span class="lbl">관리자 · 현황</span><span class="desc">제출 현황 · 결재함</span></span>
      <span class="home-badge" id="home-badge-admin"></span>
      <i class="ti ti-chevron-right chev"></i>
    </button>
    <button class="home-btn" onclick="openSettings()">
      <span class="home-ic slate"><i class="ti ti-settings"></i></span>
      <span class="home-tw"><span class="lbl">관리자 · 설정</span><span class="desc">마감기한 · 사업장 명단</span></span>
      <i class="ti ti-chevron-right chev"></i>
    </button>
  </div>
</div>

<!-- ===== 앱 화면 ===== -->
<div id="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()"><i class="ti ti-arrow-left"></i> 뒤로</button>
    <h2 id="screen-title"></h2>
  </div>
  <div class="screen-body">

    <!-- 영양사 업로드 -->
    <div class="section" id="sec-submit">
      <div class="form-group">
        <label class="field-label">내 이름 <span class="required">*</span></label>
        <select id="manager-select" onchange="onManagerChange()"><option value="">이름 선택</option></select>
        <div class="sub-hint" id="site-hint"></div>
      </div>
      <select id="site-select" style="display:none;"></select>

      <div id="nav-area"></div>

      <div id="form-area" style="display:none;">
        <div id="form-header"></div>
        <div class="two-col">
          <div><label class="field-label">사업장</label><div class="static-field" id="form-site"></div></div>
          <div><label class="field-label" id="period-label">날짜 <span class="required">*</span></label>
            <input type="date" id="date-input" onchange="onContextChange()" /></div>
        </div>
        <div class="deadline-banner" id="deadline-banner"></div>
        <div id="submit-body"></div>
        <div class="submit-wrap" id="submit-wrap" style="display:none;">
          <button class="btn-submit" id="btn-submit" onclick="submitSlots()">모두 제출</button>
        </div>
      </div>
    </div>

    <!-- 관리자 · 현황 -->
    <div class="section" id="sec-admin">
      <div id="admin-lock">
        <div class="lock-box">
          <div style="font-size:16px;font-weight:600;margin-bottom:6px;">관리자 · 현황</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">비밀번호를 입력하세요.</div>
          <div style="display:flex;gap:8px;">
            <input type="password" id="admin-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlockAdmin()" />
            <button class="btn-primary" onclick="unlockAdmin()">확인</button>
          </div>
          <div id="admin-pw-err" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
        </div>
      </div>
      <div id="admin-content" style="display:none;">
        <div class="admin-controls">
          <input type="date" id="admin-date" onchange="loadAdmin()" />
          <button class="btn-secondary" onclick="loadAdmin()"><i class="ti ti-refresh"></i> 조회</button>
          <span style="font-size:12px;color:var(--text4);margin-left:auto;" id="admin-updated"></span>
        </div>
        <div class="grid-wrap" id="matrix-wrap"><div class="empty">날짜를 선택해 조회하세요</div></div>
        <div id="detail-wrap"></div>
        <div class="section-title">결재함 (지출 · 휴가 · 경조사 등)</div>
        <div id="approval-wrap"><div class="empty">대기 중인 결재가 없습니다</div></div>
      </div>
    </div>

    <!-- 관리자 · 설정 -->
    <div class="section" id="sec-settings">
      <div id="settings-lock">
        <div class="lock-box">
          <div style="font-size:16px;font-weight:600;margin-bottom:6px;">관리자 · 설정</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">비밀번호를 입력하세요.</div>
          <div style="display:flex;gap:8px;">
            <input type="password" id="settings-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlockSettings()" />
            <button class="btn-primary" onclick="unlockSettings()">확인</button>
          </div>
          <div id="settings-pw-err" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
        </div>
      </div>
      <div id="settings-content" style="display:none;">
        <div class="section-title" style="margin-top:0;">항목별 마감기한</div>
        <div class="setting-block" id="deadline-settings"></div>
        <div class="section-title">사업장 · 매니저</div>
        <div class="setting-block" id="site-summary"></div>
      </div>
    </div>

const todayStr=(()=>{const n=new Date();return new Date(n.getTime()+9*36e5).toISOString().slice(0,10);})();
function sani(s){return String(s).replace(/[^a-zA-Z0-9가-힣_-]/g,'_');}
function $(id){return document.getElementById(id);}
function showLoading(m){$('loading-text').textContent=m||'처리 중...';$('loading').classList.add('show');}
function hideLoading(){$('loading').classList.remove('show');}
function toast(m,err){const t=$('toast');t.textContent=m;t.className='toast'+(err?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function getDayType(d){const g=new Date(d).getDay();return g===6?'토요일':g===0?'일요일':'평일';}
function getMeals(site,date){return (SITE_MEALS[site]&&SITE_MEALS[site][getDayType(date)])||[];}
function cMgr(){return $('manager-select').value;}
function cSite(){return $('site-select').value;}
function cDate(){return $('date-input').value;}
function periodOf(typeKey,date){const t=TYPES[typeKey];if(t.period==='monthly')return date.slice(0,7);return date;}
function deadlineOf(typeKey){
  const r=DEADLINES[typeKey];if(!r||!r.date)return null;
  if(r.mode==='time'&&r.time)return new Date(r.date+'T'+r.time+':00');
  return new Date(r.date+'T23:59:59');
}
const WEEKDAY=['일','월','화','수','목','금','토'];
function fmtDeadline(r){
  if(!r||!r.date)return '';
  const [y,m,d]=r.date.split('-').map(Number);
  const wd=WEEKDAY[new Date(y,m-1,d).getDay()];
  const tail=(r.mode==='time'&&r.time)?`${Number(r.time.split(':')[0])}시${r.time.split(':')[1]}분`:'종일';
  return `마감일: ${m}/${d}(${wd}) ${tail}`;
}
function expectedSlots(typeKey,site,date){
  const t=TYPES[typeKey];
  if(t.kind==='approval')return[];
  if(t.slot==='meals')return getMeals(site,date);
  return['기본'];
}

// ── config ──
async function loadConfig(){
  try{
    const s=await getDoc(doc(db,'config','settings'));
    if(s.exists()){const d=s.data();if(d.managers)MANAGERS=d.managers;if(d.siteMeals)SITE_MEALS=d.siteMeals;}
    const dl=await getDoc(doc(db,'config','deadlines'));
    if(dl.exists())DEADLINES=dl.data().rules||{};
  }catch(e){console.error('config 로드 실패',e);}
}
async function saveDeadlines(){await setDoc(doc(db,'config','deadlines'),{rules:DEADLINES,updatedAt:new Date().toISOString()});}

// ── 초기화 ──
async function init(){
  showLoading('불러오는 중...');
  await loadConfig();
  hideLoading();
  const mSel=$('manager-select');
  [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>mSel.appendChild(new Option(m.name,m.name)));
  $('date-input').value=todayStr;$('admin-date').value=todayStr;
  const saved=localStorage.getItem('savedManager');
  if(saved&&MANAGERS.find(m=>m.name===saved)){mSel.value=saved;onManagerChange();}
  history.replaceState({screen:'home'},'');
  applyState({screen:'home'});
}
init();

// ── 화면 네비게이션 (History API) ──
function go(st){history.pushState(st,'');applyState(st);}
window.openSubmit=function(){go({screen:'submit',view:'site'});};
window.openAdmin=function(){go({screen:'admin'});};
window.openSettings=function(){go({screen:'settings'});};
function applyState(st){
  st=st||{screen:'home'};curScreen=st.screen;
  if(st.screen==='home'){$('home-screen').style.display='flex';$('screen').style.display='none';updateHomeBadge();return;}
  $('home-screen').style.display='none';$('screen').style.display='flex';
  const titles={submit:'영양사 업로드',admin:'관리자 · 현황',settings:'관리자 · 설정'};
  $('screen-title').textContent=titles[st.screen]||'';
  ['submit','admin','settings'].forEach(s=>$('sec-'+s).style.display=s===st.screen?'block':'none');
  if(st.screen==='submit')applySubmitView(st.view||'site');
  window.scrollTo({top:0,behavior:'auto'});
}
function applySubmitView(view){
  navView=view;
  if(view==='form'){$('nav-area').style.display='none';$('form-area').style.display='block';if(curType)renderForm();}
  else{$('form-area').style.display='none';$('nav-area').style.display='block';renderNav();}
}
window.addEventListener('popstate',e=>applyState(e.state));

async function updateHomeBadge(){
  try{
    const snap=await getDocs(query(collection(db,'records'),where('status','==','pending')));
    let n=0;snap.forEach(d=>{if(d.data().kind==='approval')n++;});
    const b=$('home-badge-admin');if(b){b.style.display=n>0?'inline-flex':'none';b.textContent=n;}
  }catch(e){}
}

// ── 사업장 선택 → 카테고리 아코디언 → 항목 ──
function accordionHtml(){
  return GROUP_ORDER.map(g=>{
    const open=expandedGroup===g;
    const keys=Object.keys(TYPES).filter(k=>TYPES[k].group===g);
    const readyN=keys.filter(k=>TYPES[k].ready).length;
    const dlCount=keys.filter(k=>TYPES[k].ready&&DEADLINES[k]&&DEADLINES[k].date).length;
    const dlBadge=dlCount>0?`<span class="dl-badge">${dlCount}</span>`:'';
    const grid=keys.map(k=>{const t=TYPES[k];
      const dr=DEADLINES[k];
      const dlTag=(dr&&dr.date)?`<span class="gi-dl">${fmtDeadline(dr)}</span>`:'';
      return t.ready
        ? `<button class="grid-item" onclick="openType('${k}')"><span class="gi-icon"><i class="ti ${KIND_ICON[t.kind]}"></i></span><span class="gi-tw"><span class="gi-label">${t.label}</span>${dlTag}</span><i class="ti ti-chevron-right gi-arrow"></i></button>`
        : `<div class="grid-item soon"><span class="gi-icon"><i class="ti ${KIND_ICON[t.kind]}"></i></span><span class="gi-tw"><span class="gi-label">${t.label}</span></span><span class="gi-soon">준비중</span></div>`;
    }).join('');
    return `<div class="acc${open?' open':''}" id="acc-${g}">
      <button class="acc-head" onclick="toggleGroup('${g}')">
        <span class="acc-icon"><i class="ti ${GROUP_ICON[g]}"></i></span>
        <span class="acc-tw"><span class="acc-name">${g}</span><span class="acc-count">${readyN}개 항목</span></span>
        ${dlBadge}
        <i class="ti ti-chevron-down acc-chev"></i>
      </button>
      <div class="acc-body"><div class="item-grid">${grid}</div></div>
    </div>`;
  }).join('');
}

function renderSubmitBody(){

function renderDeadlineBanner(slots){
  const date=cDate(),dl=deadlineOf(curType,date);
  const done=slots.filter(s=>slotState[s]&&slotState[s].record).length;
  let pill,cls;
  if(done===slots.length){cls='dl-done';pill='제출완료';}
  else if(dl&&Date.now()>dl.getTime()){cls='dl-late';pill='마감 지남';}
  else if(dl&&dl.getTime()-Date.now()<6*36e5){cls='dl-soon';pill='마감 임박';}
  else{cls='dl-open';pill=done>0?`진행 ${done}/${slots.length}`:'미제출';}
  const r=DEADLINES[curType];
  const dlText=dl?fmtDeadline(r):'마감 미설정';
  $('deadline-banner').innerHTML=`<span>${dlText}</span><span class="dl-pill ${cls}">${pill}</span>`;

function buildSlot(slot){
  const t=TYPES[curType],st=slotState[slot]||{},rec=st.record;
  const done=!!rec;
  let inner='';
  if(done){
    if(t.kind==='photo')inner=`<img class="thumb" src="${rec.photoURLs[0]}" onclick="openModal('${rec.photoURLs[0]}')"/>`;
    else if(t.kind==='file')inner=`<div class="file-line"><i class="ti ti-paperclip"></i> <a href="${rec.fileURL}" target="_blank">${rec.fileName||'첨부파일'}</a></div>`;
    else if(t.kind==='form')inner=`<div class="file-line">${t.fields.map(f=>`${f.label}: <b>${rec.form?rec.form[f.key]??'-':'-'}</b>`).join(' · ')}</div>`;
  }else{
    if(t.kind==='photo')inner=`<label class="btn-upload${st.preview?' has':''}"><i class="ti ti-camera"></i><span>${st.preview?'사진 변경':'사진 추가'}</span><input type="file" accept="image/*" onchange="onPick('${slot}',this)"/></label>${st.preview?`<img class="thumb" src="${st.preview}"/>`:''}`;
    else if(t.kind==='file')inner=`<label class="btn-upload${st.file?' has':''}"><i class="ti ti-file-upload"></i><span>${st.file?st.file.name:'파일 첨부 (PDF·이미지)'}</span><input type="file" onchange="onPick('${slot}',this)"/></label>`;
    else if(t.kind==='form')inner=`<div class="form-fields">${t.fields.map(f=>`<input type="${f.type==='number'?'number':'text'}" placeholder="${f.label}" value="${st.form&&st.form[f.key]!=null?st.form[f.key]:''}" oninput="onForm('${slot}','${f.key}',this.value)"/>`).join('')}</div>`;
  }
  return `<div class="slot-row${done?' done':''}">
    <div class="slot-head"><span class="slot-name">${slot}</span>${done?'<span class="badge-done">● 제출완료</span>':''}</div>
    ${inner}</div>`;
}
window.onPick=function(slot,input){

function updateSubmitBtn(){

    return st&&st.file;}).length;

function compressImage(file){return new Promise(res=>{
  const url=URL.createObjectURL(file),img=new Image();
  const cl=()=>URL.revokeObjectURL(url);const tm=setTimeout(()=>{cl();res(file);},15000);
  img.onload=()=>{clearTimeout(tm);try{cl();const c=document.createElement('canvas');let w=img.width,h=img.height,mw=1200,q=.8;
    if(w>4000||h>4000){mw=800;q=.7;}else if(w>3000||h>3000){mw=900;q=.72;}else if(w>2000||h>2000){mw=1000;q=.76;}
    if(w>h){if(w>mw){h=Math.round(h*mw/w);w=mw;}}else{if(h>mw){w=Math.round(w*mw/h);h=mw;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>res(b||file),'image/jpeg',q);}catch(e){res(file);}};
  img.onerror=()=>{clearTimeout(tm);cl();res(file);};img.src=url;});}
function withTimeout(p,ms,l){return Promise.race([p,new Promise((_,rj)=>setTimeout(()=>rj(new Error((l||'작업')+' 시간 초과')),ms))]);}

window.submitSlots=async function(){
  const t=TYPES[curType],manager=cMgr(),site=cSite(),date=cDate(),period=periodOf(curType,date);
  if(!manager){toast('매니저를 선택하세요',true);return;}
  const slots=expectedSlots(curType,site,date);
  const targets=slots.filter(s=>{const st=slotState[s];if(st&&st.record)return false;
    if(t.kind==='form')return st&&st.form&&t.fields.some(f=>st.form[f.key]!=null&&st.form[f.key]!=='');
    return st&&st.file;});
  if(!targets.length){toast('제출할 내용이 없습니다',true);return;}
  $('btn-submit').disabled=true;
  let done=0;
  for(const slot of targets){
    $('btn-submit').textContent=`${slot} 제출 중... (${done+1}/${targets.length})`;
    try{
      const st=slotState[slot];
      const base={type:curType,kind:t.kind,manager,site,period,slot,submittedAt:new Date().toISOString(),status:'submitted'};
      const docId=`${curType}__${sani(site)}__${period}__${sani(slot)}`;
      if(t.kind==='photo'){
        const blob=await compressImage(st.file);
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.jpg`);
        await withTimeout(uploadBytes(sref,blob),30000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,photoURLs:[url]});
      }else if(t.kind==='file'){
        const ext=(st.file.name.split('.').pop()||'dat').toLowerCase();
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.${ext}`);
        await withTimeout(uploadBytes(sref,st.file),60000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,fileURL:url,fileName:st.file.name});
      }else if(t.kind==='form'){
        await setDoc(doc(db,'records',docId),{...base,form:st.form});
      }
      slotState[slot]={record:{...base}};done++;
    }catch(e){toast(`${slot} 실패 — ${e.message&&e.message.includes('시간 초과')?'네트워크 불안정, 다시 시도':'다시 시도해 주세요'}`,true);console.error(e);}
  }
  renderSubmitBody();
  toast(`제출 완료! (${done}건)`);
};

window.loadAdmin=async function(){

function renderMatrix(date){
  const month=date.slice(0,7);
  let html='<table class="matrix"><thead><tr><th class="site">사업장</th>';
  MATRIX_TYPES.forEach(k=>html+=`<th>${TYPES[k].label}</th>`);

    html+=`<tr><td class="site">${site}</td>`;
    MATRIX_TYPES.forEach(k=>{
      const t=TYPES[k],period=t.period==='monthly'?month:date;
      const slots=expectedSlots(k,site,date);
      if(!slots.length){html+=`<td class="cell-na">-</td>`;return;}
      const done=slots.filter(s=>adminCache[`${k}|${site}|${period}|${s}`]).length;
      const dl=deadlineOf(k,date),late=dl&&Date.now()>dl.getTime();
      let cls,sym;
      if(done===slots.length){cls='cell-done';sym='O';}

  $('site-summary').innerHTML=`<div style="font-size:14px;margin-bottom:12px;">현재 등록: 사업장 <b>${sites}</b>곳 · 매니저 <b>${mgrs}</b>명</div>
    <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;">데이터 가져오기 (JSON 붙여넣기)</div>
    <div class="sub-hint" style="margin-bottom:8px;">보존식 앱 "내보내기"에서 복사한 내용을 붙여넣고 저장하면 매니저·사업장 명단이 이 명단으로 갱신됩니다.</div>
    <textarea id="import-json" placeholder='{"managers":[...],"siteMeals":{...}}' style="height:140px;font-family:monospace;font-size:12px;"></textarea>
    <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="importConfig()"><i class="ti ti-download"></i> 가져와서 저장</button>`;
}
function refreshManagerDropdown(){
  const mSel=$('manager-select');const cur=mSel.value;
  mSel.innerHTML='<option value="">이름 선택</option>';
  [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>mSel.appendChild(new Option(m.name,m.name)));
  if(MANAGERS.find(m=>m.name===cur))mSel.value=cur;
}
window.importConfig=async function(){
  const raw=$('import-json').value.trim();
  if(!raw){toast('JSON을 붙여넣어 주세요',true);return;}
  let data;try{data=JSON.parse(raw);}catch(e){toast('JSON 형식이 올바르지 않습니다',true);return;}
  if(!Array.isArray(data.managers)||typeof data.siteMeals!=='object'||!data.siteMeals){toast('managers / siteMeals 형식이 필요합니다',true);return;}
  showLoading('저장 중...');
  try{
    await setDoc(doc(db,'config','settings'),{managers:data.managers,siteMeals:data.siteMeals,updatedAt:new Date().toISOString()});
    MANAGERS=data.managers;SITE_MEALS=data.siteMeals;
    refreshManagerDropdown();renderSiteSummary();
    hideLoading();toast(`저장 완료 — 매니저 ${MANAGERS.length}명 · 사업장 ${Object.keys(SITE_MEALS).length}곳`);
  }catch(e){hideLoading();toast('저장 실패: '+e.message,true);}
};

window.openModal=function(url){$('modal-img').src=url;$('modal').classList.add('open');};
</script>
</body>
</html>

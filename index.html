<!DOCTYPE html>
<!--
  온정 F&B 통합 영양사 업로드 어플 — 골격(skeleton)
  ─────────────────────────────────────────────
  ▶ 기존 보존식 앱의 구조(Firebase + 매니저/사업장 모델 + 현황 그리드)를
    "항목 타입 엔진"으로 일반화한 버전입니다.
  ▶ 한 가지 타입을 추가할 때 TYPES 객체에 정의만 추가하면
    제출 화면 · 현황 대시보드 · 마감관리가 자동으로 붙습니다.

  ★ 시작 전 꼭 확인 (TODO)
   1. 아래 firebaseConfig 는 기존 프로젝트 그대로입니다.
      → 개발/테스트는 반드시 별도(테스트) 프로젝트에서 하세요.
        실데이터(보존식)는 'submissions' 컬렉션에 있고, 이 앱은 'records'를 씁니다.
        기존 보존식 이력 이전은 별도 마이그레이션 스크립트로 진행하면 됩니다.
   2. ADMIN_PW(관리자/팀 페이지 비밀번호)를 운영용으로 바꾸세요.
   3. Firestore 보안 규칙(Rules)을 잠그세요. 지출/휴가/경조사는 금액·개인정보입니다.
   4. records 컬렉션에 type/period/status 복합 조회를 쓰면 콘솔에서 색인 링크를 눌러 생성하세요.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>온정 F&B 영양사 업로드</title>
<style>
:root{--bg:#f5f5f3;--bg2:#fff;--bg3:#fafafa;--border:#e0e0e0;--border2:#e8e8e8;--text1:#1a1a1a;--text2:#666;--text3:#999;--text4:#bbb;--green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;--amber:#BA7517;--amber-light:#FAEEDA;--red:#e24b4a;--red-light:#FCEBEB;--red-dark:#A32D2D;--shadow:rgba(0,0,0,0.08);}
.dark{--bg:#111;--bg2:#1e1e1e;--bg3:#2a2a2a;--border:#333;--border2:#2a2a2a;--text1:#f0f0f0;--text2:#aaa;--text3:#666;--text4:#444;--shadow:rgba(0,0,0,0.4);--green-light:#10362c;--green-dark:#5DCAA5;--amber-light:#3a2c12;--red-light:#3a1718;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--text1);}
.app{max-width:760px;margin:0 auto;padding:1rem;padding-bottom:3rem;}
.header{padding:1.25rem 0 0.5rem;display:flex;justify-content:space-between;align-items:center;}
.brand{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:600;}
.brand-dot{width:11px;height:11px;border-radius:3px;background:var(--green);box-shadow:0 0 0 3px var(--green-light);}
.btn-dark{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:16px;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.5rem;overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:10px 14px;font-size:14px;color:var(--text3);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;font-family:inherit;white-space:nowrap;min-height:44px;}
.tab.active{color:var(--text1);border-bottom:2px solid var(--text1);font-weight:500;}
.section{display:none;}.section.active{display:block;}
label.field-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.required{color:var(--red);margin-left:2px;}
.form-group{margin-bottom:1.25rem;}
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;margin-bottom:1.25rem;}
select,input[type="date"],input[type="month"],input[type="text"],input[type="number"],input[type="password"],textarea{width:100%;min-height:44px;padding:10px 12px;font-size:16px;border:1px solid var(--border);border-radius:10px;background:var(--bg2);color:var(--text1);font-family:inherit;-webkit-appearance:none;appearance:none;}
textarea{resize:vertical;}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--text1);}
select:disabled{opacity:0.4;background:var(--bg3);}
.sub-hint{font-size:12px;color:var(--text4);margin-top:5px;}
.type-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;}
.type-chip{padding:8px 14px;font-size:13px;border:1px solid var(--border);border-radius:99px;cursor:pointer;background:var(--bg2);color:var(--text2);user-select:none;}
.type-chip.on{border-color:var(--text1);background:var(--text1);color:var(--bg2);font-weight:500;}
.type-chip.soon{opacity:0.45;cursor:not-allowed;}
.type-group-label{font-size:11px;color:var(--text4);font-weight:500;width:100%;margin:4px 0 -2px;}
.acc{border:1px solid var(--border2);border-radius:14px;background:var(--bg2);margin-bottom:12px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.acc.open{border-color:var(--green);box-shadow:0 3px 16px var(--shadow);}
.acc-head{display:flex;align-items:center;gap:14px;width:100%;padding:15px 18px;background:none;border:none;cursor:pointer;font-family:inherit;text-align:left;}
.acc-icon{width:42px;height:42px;flex-shrink:0;border-radius:12px;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;}
.acc-icon svg{width:23px;height:23px;}
.acc-tw{flex:1;display:flex;flex-direction:column;gap:2px;}
.acc-name{font-size:16px;font-weight:600;color:var(--text1);}
.acc-count{font-size:12px;color:var(--text3);}
.acc-chev{width:20px;height:20px;color:var(--text4);flex-shrink:0;transition:transform .25s,color .25s;}
.acc.open .acc-chev{transform:rotate(180deg);color:var(--green);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .32s ease;}
.acc.open .acc-body{max-height:900px;}
.item-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:2px 16px 16px;}
.grid-item{display:flex;flex-direction:column;align-items:flex-start;gap:10px;padding:14px;border:1px solid var(--border2);border-radius:12px;background:var(--bg3);cursor:pointer;font-family:inherit;text-align:left;transition:transform .12s,border-color .2s,background .2s;}
.grid-item:hover{border-color:var(--green);background:var(--bg2);}
.grid-item:active{transform:scale(.97);}
.gi-icon{width:36px;height:36px;border-radius:10px;background:var(--bg2);border:1px solid var(--border2);color:var(--green-dark);display:flex;align-items:center;justify-content:center;}
.gi-icon svg{width:20px;height:20px;}
.grid-item:hover .gi-icon{background:var(--green-light);border-color:var(--green-light);}
.gi-label{font-size:13.5px;font-weight:500;color:var(--text1);line-height:1.35;}
.grid-item.soon{opacity:.5;cursor:default;}
.grid-item.soon:hover{border-color:var(--border2);background:var(--bg3);}
.grid-item.soon .gi-icon{color:var(--text4);background:var(--bg2);border-color:var(--border2);}
.gi-soon{font-size:11px;color:var(--text4);}
.back-btn{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;padding:6px 0;margin-bottom:6px;}
.cat-title{font-size:19px;font-weight:600;margin-bottom:16px;}
.static-field{min-height:44px;padding:10px 12px;border:1px solid var(--border2);border-radius:10px;background:var(--bg3);color:var(--text1);font-size:15px;display:flex;align-items:center;}
.pick-title{font-size:18px;font-weight:600;margin:6px 0 14px;}
.site-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.site-pick{display:flex;align-items:center;gap:12px;padding:15px 14px;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);cursor:pointer;font-family:inherit;text-align:left;transition:transform .12s,border-color .2s,background .2s;}
.site-pick:hover{border-color:var(--green);background:var(--bg3);}
.site-pick:active{transform:scale(.97);}
.sp-icon{width:36px;height:36px;border-radius:10px;background:var(--green-light);color:var(--green-dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sp-icon svg{width:20px;height:20px;}
.sp-name{font-size:14px;font-weight:500;color:var(--text1);line-height:1.3;}
.site-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border:1px solid var(--border2);border-radius:11px;background:var(--bg3);margin-bottom:14px;}
.sb-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--text1);}
.sb-left svg{width:16px;height:16px;color:var(--green-dark);flex-shrink:0;}
.site-change{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;}
.deadline-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:1rem;font-size:13px;border:1px solid var(--border2);background:var(--bg2);}
.dl-pill{font-size:12px;font-weight:500;padding:4px 10px;border-radius:99px;white-space:nowrap;}
.dl-done{background:var(--green-light);color:var(--green-dark);}
.dl-open{background:var(--bg3);color:var(--text2);}
.dl-soon{background:var(--amber-light);color:var(--amber);}
.dl-late{background:var(--red-light);color:var(--red-dark);}
.slot-row{border:1px solid var(--border2);border-radius:12px;margin-bottom:10px;padding:14px 16px;background:var(--bg2);}
.slot-row.done{border-color:var(--green);}
.slot-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;}
.slot-name{font-size:15px;font-weight:500;}
.badge-done{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--green-light);color:var(--green-dark);}
.btn-upload{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;font-size:14px;font-weight:500;border:1.5px dashed var(--border);border-radius:10px;background:var(--bg3);color:var(--text2);cursor:pointer;position:relative;overflow:hidden;}
.btn-upload.has{border-style:solid;border-color:var(--text1);color:var(--text1);background:var(--bg2);}
.btn-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0;}
.thumb{width:100%;max-height:240px;object-fit:cover;border-radius:10px;margin-top:10px;display:block;border:1px solid var(--border2);}
.file-line{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:13px;color:var(--text2);}
.form-fields{display:flex;flex-direction:column;gap:10px;}
.btn-primary{padding:0 16px;min-height:44px;font-size:14px;font-weight:500;background:var(--text1);color:var(--bg2);border:none;border-radius:10px;cursor:pointer;font-family:inherit;}
.btn-secondary{padding:0 14px;min-height:44px;font-size:14px;font-weight:500;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;font-family:inherit;color:var(--text1);}
.btn-green{padding:0 14px;min-height:44px;font-size:14px;font-weight:500;background:var(--green);border:none;border-radius:10px;cursor:pointer;color:#fff;font-family:inherit;}
.btn-red{padding:0 14px;min-height:44px;font-size:14px;font-weight:500;background:var(--bg2);border:1px solid var(--red);border-radius:10px;cursor:pointer;color:var(--red);font-family:inherit;}
.submit-wrap{position:sticky;bottom:1rem;margin-top:1rem;}
.btn-submit{width:100%;padding:16px;font-size:16px;font-weight:600;background:var(--text1);color:var(--bg2);border:none;border-radius:14px;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px var(--shadow);}
.btn-submit:disabled{opacity:0.35;cursor:not-allowed;}
.admin-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.admin-controls input[type="date"]{width:auto;flex:0 0 auto;}
.grid-wrap{overflow-x:auto;border:1px solid var(--border2);border-radius:12px;background:var(--bg2);margin-bottom:1.5rem;}
table.matrix{border-collapse:collapse;font-size:12px;width:100%;}
.matrix th,.matrix td{border-right:0.5px solid var(--border2);border-bottom:0.5px solid var(--border2);text-align:center;white-space:nowrap;padding:7px 9px;}
.matrix th.site,.matrix td.site{text-align:left;position:sticky;left:0;background:var(--bg3);min-width:120px;z-index:1;}
.matrix td.site{background:var(--bg2);}
.matrix th{background:var(--bg3);color:var(--text2);font-weight:500;}
.cell{cursor:pointer;font-weight:600;}
.cell-done{background:var(--green-light);color:var(--green-dark);}
.cell-part{background:var(--amber-light);color:var(--amber);}
.cell-none{color:var(--text4);}
.cell-late{background:var(--red-light);color:var(--red-dark);}
.cell-na{background:var(--bg3);color:var(--text4);}
.section-title{font-size:15px;font-weight:600;margin:1.5rem 0 0.75rem;}
.appr-card{border:1px solid var(--border2);border-radius:12px;padding:14px 16px;margin-bottom:10px;background:var(--bg2);}
.appr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
.appr-title{font-size:15px;font-weight:500;}
.appr-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.appr-amt{font-size:15px;font-weight:600;white-space:nowrap;}
.appr-reason{font-size:13px;color:var(--text2);margin:8px 0;white-space:pre-wrap;}
.appr-actions{display:flex;gap:8px;}
.status-pill{font-size:12px;font-weight:500;padding:3px 10px;border-radius:99px;}
.st-pending{background:var(--amber-light);color:var(--amber);}
.st-approved{background:var(--green-light);color:var(--green-dark);}
.st-rejected{background:var(--red-light);color:var(--red-dark);}
.empty{text-align:center;padding:3rem 1rem;color:var(--text4);font-size:14px;}
.setting-block{border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px;background:var(--bg2);}
.dl-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border2);}
.dl-row:last-child{border-bottom:none;}
.dl-row .nm{font-size:14px;}
.dl-row input{width:auto;min-width:84px;}
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.85);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.dark .loading{background:rgba(0,0,0,0.7);}
.loading.show{display:flex;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text1);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--text1);color:var(--bg2);padding:12px 22px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:90vw;text-align:center;}
.toast.show{opacity:1;}.toast.error{background:var(--red);}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out;}
.modal.open{display:flex;}
.modal img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:8px;}
.lock-box{max-width:320px;margin:2rem auto;}
@media(max-width:480px){.two-col{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="brand"><span class="brand-dot"></span>온정 F&amp;B</div>
    <button class="btn-dark" onclick="toggleDark()" id="dark-btn">🌙</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" data-tab="submit" onclick="switchTab('submit')">영양사 업로드</button>
    <button class="tab" data-tab="admin" onclick="switchTab('admin')">관리자 · 현황</button>
    <button class="tab" data-tab="settings" onclick="switchTab('settings')">관리자 · 설정</button>
  </div>

  <!-- ===== 제출 (영양사) ===== -->
  <div class="section active" id="sec-submit">
    <div class="form-group">
      <label class="field-label">내 이름 <span class="required">*</span></label>
      <select id="manager-select" onchange="onManagerChange()"><option value="">이름 선택</option></select>
      <div class="sub-hint" id="site-hint"></div>
    </div>
    <select id="site-select" style="display:none;"></select>

    <div id="nav-area"></div>

    <div id="form-area" style="display:none;">
      <div id="form-header"></div>
      <div class="two-col">
        <div><label class="field-label">사업장</label>
          <div class="static-field" id="form-site"></div></div>
        <div><label class="field-label" id="period-label">날짜 <span class="required">*</span></label>
          <input type="date" id="date-input" onchange="onContextChange()" /></div>
      </div>
      <div id="deadline-banner"></div>
      <div id="submit-body"></div>
      <div class="submit-wrap" id="submit-wrap" style="display:none;">
        <button class="btn-submit" id="btn-submit" onclick="submitSlots()">모두 제출</button>
      </div>
    </div>
  </div>

  <!-- ===== 현황 · 결재 (관리자/팀) ===== -->
  <div class="section" id="sec-admin">
    <div id="admin-lock">
      <div class="lock-box">
        <div style="font-size:16px;font-weight:600;margin-bottom:6px;">관리자 · 팀 페이지</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">비밀번호를 입력하세요.</div>
        <div style="display:flex;gap:8px;">
          <input type="password" id="admin-pw" placeholder="비밀번호" style="flex:1;" onkeydown="if(event.key==='Enter')unlockAdmin()" />
          <button class="btn-primary" onclick="unlockAdmin()">확인</button>
        </div>
        <div id="admin-pw-err" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
      </div>
    </div>
    <div id="admin-content" style="display:none;">
      <div class="admin-controls">
        <input type="date" id="admin-date" onchange="loadAdmin()" />
        <button class="btn-secondary" onclick="loadAdmin()">조회</button>
        <span style="font-size:12px;color:var(--text4);margin-left:auto;" id="admin-updated"></span>
      </div>
      <div class="grid-wrap" id="matrix-wrap"><div class="empty">날짜를 선택해 조회하세요</div></div>
      <div id="detail-wrap"></div>
      <div class="section-title">결재함 (지출 · 휴가 · 경조사)</div>
      <div id="approval-wrap"><div class="empty">대기 중인 결재가 없습니다</div></div>
    </div>
  </div>

  <!-- ===== 설정 ===== -->
  <div class="section" id="sec-settings">
    <div id="settings-lock">
      <div class="lock-box">
        <div style="font-size:16px;font-weight:600;margin-bottom:6px;">설정</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:1rem;">비밀번호를 입력하세요.</div>
        <div style="display:flex;gap:8px;">
          <input type="password" id="settings-pw" placeholder="비밀번호" style="flex:1;" onkeydown="if(event.key==='Enter')unlockSettings()" />
          <button class="btn-primary" onclick="unlockSettings()">확인</button>
        </div>
        <div id="settings-pw-err" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
      </div>
    </div>
    <div id="settings-content" style="display:none;">
      <div class="section-title" style="margin-top:0;">항목별 마감기한</div>
      <div class="setting-block" id="deadline-settings"></div>
      <div class="section-title">사업장 · 매니저</div>
      <div class="sub-hint" style="margin-bottom:10px;">기존 보존식 앱의 사업장/매니저 설정과 동일한 config를 공유합니다. 여기서는 요약만 표시합니다.</div>
      <div class="setting-block" id="site-summary"></div>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><div style="font-size:14px;color:var(--text2);" id="loading-text">처리 중...</div></div>
<div class="modal" id="modal" onclick="this.classList.remove('open')"><img id="modal-img" src="" /></div>
<div class="toast" id="toast"></div>

<script type="module">

// 선택한 항목/날짜의 period 값
function periodOf(typeKey,date){const t=TYPES[typeKey];if(t.period==='monthly')return date.slice(0,7);return date;}
// 해당 항목/period 의 마감 시각(Date) 계산
function deadlineOf(typeKey,date){
  const t=TYPES[typeKey],rule=DEADLINES[typeKey];if(!rule||!rule.time)return null;
  const[h,mi]=rule.time.split(':').map(Number);
  if(t.period==='monthly'){
    const[y,m]=date.slice(0,7).split('-').map(Number);
    const nm=new Date(y,m,rule.day||5,h,mi);// 익월 day일
    return nm;
  }
  const d=new Date(date+'T00:00:00');d.setHours(h,mi,0,0);return d;
}
function expectedSlots(typeKey,site,date){
  const t=TYPES[typeKey];
  if(t.kind==='approval')return[];
  if(t.slot==='meals')return getMeals(site,date);
  return['기본'];
}

async function loadConfig(){

    const s=await getDoc(doc(db,'config','settings'));

function renderDeadlineBanner(slots){
  const date=cDate(),dl=deadlineOf(curType,date);
  const done=slots.filter(s=>slotState[s]&&slotState[s].record).length;
  let pill,cls;
  if(done===slots.length){cls='dl-done';pill='제출완료';}
  else if(dl&&Date.now()>dl.getTime()){cls='dl-late';pill='마감 지남';}
  else if(dl&&dl.getTime()-Date.now()<6*36e5){cls='dl-soon';pill='마감 임박';}
  else{cls='dl-open';pill=done>0?`진행 ${done}/${slots.length}`:'미제출';}
  const dlText=dl?`마감 ${dl.getMonth()+1}/${dl.getDate()} ${String(dl.getHours()).padStart(2,'0')}:${String(dl.getMinutes()).padStart(2,'0')}`:'마감 미설정';
  $('deadline-banner').innerHTML=`<span>${dlText}</span><span class="dl-pill ${cls}">${pill}</span>`;
}

function buildSlot(slot){
  const t=TYPES[curType],st=slotState[slot]||{},rec=st.record;
  const done=!!rec;
  let inner='';
  if(done){
    if(t.kind==='photo')inner=`<img class="thumb" src="${rec.photoURLs[0]}" onclick="openModal('${rec.photoURLs[0]}')"/>`;
    else if(t.kind==='file')inner=`<div class="file-line">📎 <a href="${rec.fileURL}" target="_blank">${rec.fileName||'첨부파일'}</a></div>`;
    else if(t.kind==='form')inner=`<div class="file-line">${t.fields.map(f=>`${f.label}: <b>${rec.form?rec.form[f.key]??'-':'-'}</b>`).join(' · ')}</div>`;
  }else{
    if(t.kind==='photo')inner=`<label class="btn-upload${st.preview?' has':''}"><span>${st.preview?'사진 변경':'사진 추가'}</span><input type="file" accept="image/*" onchange="onPick('${slot}',this)"/></label>${st.preview?`<img class="thumb" src="${st.preview}"/>`:''}`;
    else if(t.kind==='file')inner=`<label class="btn-upload${st.file?' has':''}"><span>${st.file?st.file.name:'파일 첨부 (PDF·이미지)'}</span><input type="file" onchange="onPick('${slot}',this)"/></label>`;
    else if(t.kind==='form')inner=`<div class="form-fields">${t.fields.map(f=>`<input type="${f.type==='number'?'number':'text'}" placeholder="${f.label}" value="${st.form&&st.form[f.key]!=null?st.form[f.key]:''}" oninput="onForm('${slot}','${f.key}',this.value)"/>`).join('')}</div>`;
  }
  return `<div class="slot-row${done?' done':''}">
    <div class="slot-head"><span class="slot-name">${slot}</span>${done?'<span class="badge-done">● 제출완료</span>':''}</div>
    ${inner}</div>`;
}

function updateSubmitBtn(){

    return st&&st.file;}).length;
  const btn=$('btn-submit');btn.disabled=pending===0;
  btn.textContent=pending>0?`모두 제출 (${pending}건)`:(slots.every(s=>slotState[s]&&slotState[s].record)?'제출 완료 ✓':'제출할 내용 없음');
}

// ── 압축 / 타임아웃 (기존 앱에서 가져옴) ──
function compressImage(file){return new Promise(res=>{
  const url=URL.createObjectURL(file),img=new Image();
  const cl=()=>URL.revokeObjectURL(url);const tm=setTimeout(()=>{cl();res(file);},15000);
  img.onload=()=>{clearTimeout(tm);try{cl();const c=document.createElement('canvas');let w=img.width,h=img.height,mw=1200,q=.8;
    if(w>4000||h>4000){mw=800;q=.7;}else if(w>3000||h>3000){mw=900;q=.72;}else if(w>2000||h>2000){mw=1000;q=.76;}
    if(w>h){if(w>mw){h=Math.round(h*mw/w);w=mw;}}else{if(h>mw){w=Math.round(w*mw/h);h=mw;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>res(b||file),'image/jpeg',q);}catch(e){res(file);}};
  img.onerror=()=>{clearTimeout(tm);cl();res(file);};img.src=url;});}
function withTimeout(p,ms,l){return Promise.race([p,new Promise((_,rj)=>setTimeout(()=>rj(new Error((l||'작업')+' 시간 초과')),ms))]);}

// ── 제출 실행 ──
window.submitSlots=async function(){
  const t=TYPES[curType],manager=cMgr(),site=cSite(),date=cDate(),period=periodOf(curType,date);
  if(!manager){toast('매니저를 선택하세요',true);return;}
  const slots=expectedSlots(curType,site,date);
  const targets=slots.filter(s=>{const st=slotState[s];if(st&&st.record)return false;
    if(t.kind==='form')return st&&st.form&&t.fields.some(f=>st.form[f.key]!=null&&st.form[f.key]!=='');
    return st&&st.file;});
  if(!targets.length){toast('제출할 내용이 없습니다',true);return;}
  $('btn-submit').disabled=true;
  let done=0;
  for(const slot of targets){
    $('btn-submit').textContent=`${slot} 제출 중... (${done+1}/${targets.length})`;
    try{
      const st=slotState[slot];
      const base={type:curType,kind:t.kind,manager,site,period,slot,submittedAt:new Date().toISOString(),status:'submitted'};
      const docId=`${curType}__${sani(site)}__${period}__${sani(slot)}`;
      if(t.kind==='photo'){
        const blob=await compressImage(st.file);
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.jpg`);
        await withTimeout(uploadBytes(sref,blob),30000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,photoURLs:[url]});
      }else if(t.kind==='file'){
        const ext=(st.file.name.split('.').pop()||'dat').toLowerCase();
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.${ext}`);
        await withTimeout(uploadBytes(sref,st.file),60000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,fileURL:url,fileName:st.file.name});
      }else if(t.kind==='form'){
        await setDoc(doc(db,'records',docId),{...base,form:st.form});
      }
      slotState[slot]={record:{...base}};done++;
    }catch(e){toast(`${slot} 실패 — ${e.message?.includes('시간 초과')?'네트워크 불안정, 다시 시도':'다시 시도해 주세요'}`,true);console.error(e);}
  }
  renderSubmitBody();
  toast(`제출 완료! (${done}건)`);
};

window.loadAdmin=async function(){

      const snap=await getDocs(query(collection(db,'records'),where('period','==',p)));
      snap.forEach(d=>{const r=d.data();adminCache[`${r.type}|${r.site}|${r.period}|${r.slot||'_'}`]=r;});
    }
    renderMatrix(date);
    await renderApprovalQueue();
    $('admin-updated').textContent='업데이트 '+new Date().toLocaleTimeString('ko-KR');
  }catch(e){toast('조회 실패: '+e.message,true);console.error(e);}
  hideLoading();
};

function renderMatrix(date){
  const month=date.slice(0,7);
  let html='<table class="matrix"><thead><tr><th class="site">사업장</th>';
  MATRIX_TYPES.forEach(k=>html+=`<th>${TYPES[k].label}</th>`);
  html+='</tr></thead><tbody>';
  Object.keys(SITE_MEALS).forEach(site=>{
    html+=`<tr><td class="site">${site}</td>`;
    MATRIX_TYPES.forEach(k=>{
      const t=TYPES[k],period=t.period==='monthly'?month:date;
      const slots=expectedSlots(k,site,date);
      if(!slots.length){html+=`<td class="cell-na">-</td>`;return;}
      const done=slots.filter(s=>adminCache[`${k}|${site}|${period}|${s}`]).length;
      const dl=deadlineOf(k,date),late=dl&&Date.now()>dl.getTime();
      let cls,sym;
      if(done===slots.length){cls='cell-done';sym='O';}
      else if(done>0){cls='cell-part';sym=`${done}/${slots.length}`;}
      else if(late){cls='cell-late';sym='지연';}
      else{cls='cell-none';sym='·';}
      html+=`<td class="cell ${cls}" onclick="showDetail('${k}','${site}','${period}')">${sym}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  $('matrix-wrap').innerHTML=html;
  $('detail-wrap').innerHTML='';
}

window.showDetail=function(typeKey,site,period){
  const t=TYPES[typeKey],date=$('admin-date').value;
  const slots=expectedSlots(typeKey,site,date);
  let rows=slots.map(s=>{
    const r=adminCache[`${typeKey}|${site}|${period}|${s}`];
    let v='<span class="cell-none">미제출</span>';
    if(r){
      if(t.kind==='photo')v=`<img class="thumb" style="max-height:120px;width:auto;display:inline-block;" src="${r.photoURLs[0]}" onclick="openModal('${r.photoURLs[0]}')"/>`;
      else if(t.kind==='file')v=`📎 <a href="${r.fileURL}" target="_blank">${r.fileName||'첨부'}</a>`;
      else if(t.kind==='form')v=t.fields.map(f=>`${f.label}: <b>${r.form?r.form[f.key]??'-':'-'}</b>`).join(' · ');
    }
    return `<div class="dl-row"><span class="nm">${s}</span><span style="grid-column:2/4;text-align:left;">${v}</span></div>`;
  }).join('');
  $('detail-wrap').innerHTML=`<div class="setting-block"><div style="font-weight:500;margin-bottom:8px;">${site} · ${t.label} (${period})</div>${rows}</div>`;
};

// ── 결재함 ──
async function renderApprovalQueue(){
  const snap=await getDocs(query(collection(db,'records'),where('status','==','pending')));
  const items=[];snap.forEach(d=>{const r=d.data();if(r.kind==='approval')items.push({id:d.id,...r});});
  items.sort((a,b)=>(a.submittedAt||'').localeCompare(b.submittedAt||''));
  if(!items.length){$('approval-wrap').innerHTML='<div class="empty">대기 중인 결재가 없습니다</div>';return;}
  $('approval-wrap').innerHTML=items.map(r=>{
    const t=TYPES[r.type],amt=r.form?.amount?Number(r.form.amount).toLocaleString()+'원':'';
    return `<div class="appr-card"><div class="appr-top">
      <div><div class="appr-title">${t.label} · ${r.form?.title||''}</div>
      <div class="appr-meta">${r.site} · ${r.manager} · ${(r.submittedAt||'').slice(0,10)}</div></div>
      <div class="appr-amt">${amt}</div></div>
      ${r.form?.reason?`<div class="appr-reason">${r.form.reason}</div>`:''}
      <div class="appr-actions"><button class="btn-green" onclick="decide('${r.id}','approved')">승인</button>
      <button class="btn-red" onclick="decide('${r.id}','rejected')">반려</button></div></div>`;
  }).join('');
}
window.decide=async function(id,status){
  let reason='';
  if(status==='rejected'){reason=prompt('반려 사유를 입력하세요')||'';if(reason===null)return;}
  showLoading('처리 중...');
  try{
    await updateDoc(doc(db,'records',id),{status,approvedBy:'관리자',approvedAt:new Date().toISOString(),rejectReason:reason});
    hideLoading();toast(status==='approved'?'승인 완료':'반려 처리');await renderApprovalQueue();
  }catch(e){hideLoading();toast('처리 실패: '+e.message,true);}
};

// ── 설정: 마감기한 ──
function renderDeadlineSettings(){
  const keys=Object.keys(TYPES).filter(k=>TYPES[k].kind!=='approval');
  $('deadline-settings').innerHTML=keys.map(k=>{
    const t=TYPES[k],r=DEADLINES[k]||{};
    const dayInput=t.period==='monthly'?`<input type="number" min="1" max="28" placeholder="익월N일" value="${r.day||''}" onchange="setDl('${k}','day',this.value)" title="익월 며칠"/>`:'';
    return `<div class="dl-row"><span class="nm">${t.label}<span style="color:var(--text4);font-size:11px;"> · ${t.period==='monthly'?'월':'매일'}</span></span>
      ${dayInput}<input type="time" value="${r.time||''}" onchange="setDl('${k}','time',this.value)"/></div>`;
  }).join('')+`<button class="btn-primary" style="width:100%;margin-top:14px;" onclick="saveDl()">마감기한 저장</button>`;
}
window.setDl=function(k,field,val){DEADLINES[k]=DEADLINES[k]||{};DEADLINES[k][field]=field==='day'?Number(val):val;};
window.saveDl=async function(){showLoading('저장 중...');try{await saveDeadlines();hideLoading();toast('마감기한 저장 완료!');}catch(e){hideLoading();toast('저장 실패: '+e.message,true);}};

function renderSiteSummary(){
  const sites=Object.keys(SITE_MEALS).length,mgrs=MANAGERS.length;
  $('site-summary').innerHTML=`<div style="font-size:14px;margin-bottom:12px;">현재 등록: 사업장 <b>${sites}</b>곳 · 매니저 <b>${mgrs}</b>명</div>
    <div style="font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;">데이터 가져오기 (JSON 붙여넣기)</div>
    <div class="sub-hint" style="margin-bottom:8px;">보존식 앱 "내보내기"에서 복사한 내용을 붙여넣고 저장하면 매니저·사업장 명단이 이 명단으로 갱신됩니다.</div>
    <textarea id="import-json" placeholder='{"managers":[...],"siteMeals":{...}}' style="width:100%;height:140px;font-family:monospace;font-size:12px;"></textarea>
    <button class="btn-primary" style="width:100%;margin-top:10px;" onclick="importConfig()">가져와서 저장</button>`;
}
function refreshManagerDropdown(){
  const mSel=$('manager-select');const cur=mSel.value;
  mSel.innerHTML='<option value="">이름 선택</option>';
  [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>mSel.appendChild(new Option(m.name,m.name)));
  if(MANAGERS.find(m=>m.name===cur))mSel.value=cur;
}
window.importConfig=async function(){
  const raw=$('import-json').value.trim();
  if(!raw){toast('JSON을 붙여넣어 주세요',true);return;}
  let data;try{data=JSON.parse(raw);}catch(e){toast('JSON 형식이 올바르지 않습니다',true);return;}
  if(!Array.isArray(data.managers)||typeof data.siteMeals!=='object'||!data.siteMeals){toast('managers / siteMeals 형식이 필요합니다',true);return;}
  showLoading('저장 중...');
  try{
    await setDoc(doc(db,'config','settings'),{managers:data.managers,siteMeals:data.siteMeals,updatedAt:new Date().toISOString()});
    MANAGERS=data.managers;SITE_MEALS=data.siteMeals;
    refreshManagerDropdown();renderSiteSummary();
    hideLoading();toast(`저장 완료 — 매니저 ${MANAGERS.length}명 · 사업장 ${Object.keys(SITE_MEALS).length}곳`);
  }catch(e){hideLoading();toast('저장 실패: '+e.message,true);}
};

window.openModal=function(url){$('modal-img').src=url;$('modal').classList.add('open');};
</script>

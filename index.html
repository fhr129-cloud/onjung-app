<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#185FA5">
<title>온정 F&B · 업로드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
 --bg:#f0f0ee;--card:#fff;--border:#e8e8e4;--border2:#e0e0dc;
 --text1:#1a1a18;--text2:#555;--text3:#888;--text4:#aaa;
 --blue:#185FA5;--blue-dark:#0C447C;--blue-light:#E6F1FB;--blue-border:#B5D4F4;
 --red:#A32D2D;--red-light:#FCEBEB;--red-border:#F7C1C1;
 --amber:#854F0B;--amber-light:#FAEEDA;--amber-border:#FAC775;
 --green:#3B6D11;--green-light:#EAF3DE;--green-border:#C0DD97;
 --app-w:430px;
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;min-height:100dvh;font-size:14px;-webkit-font-smoothing:antialiased;}
/* 폰 프레임 — 앱 화면을 폰 너비로 가운데 정렬 */
#home-screen,#screen{max-width:var(--app-w);margin:0 auto;width:100%;background:var(--bg);position:relative;}
/* 데스크톱에서는 폰처럼 가운데 카드로 */
@media(min-width:481px){
 body{background:#d6d8dc;}
 #home-screen,#screen{min-height:100dvh;box-shadow:0 0 0 1px rgba(0,0,0,.04),0 12px 40px rgba(0,0,0,.12);}
}

/* ── 홈 ── */
#home-screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 22px calc(40px + env(safe-area-inset-bottom));}
.home-logo{display:flex;align-items:center;gap:8px;font-size:26px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.home-logo i{font-size:28px;}
.home-sub{font-size:13px;color:var(--text4);margin-bottom:36px;}
.home-menu{display:flex;flex-direction:column;gap:12px;width:100%;max-width:440px;}
.home-btn{position:relative;background:var(--card);border:.5px solid var(--border);border-radius:13px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:box-shadow .15s,transform .15s;text-align:left;font-family:inherit;}
.home-btn:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px);}
.home-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.home-ic.blue{background:var(--blue-light);color:var(--blue);}
.home-ic.amber{background:var(--amber-light);color:var(--amber);}
.home-ic.slate{background:#EEF0F2;color:#48566B;}
.home-tw{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.home-tw .lbl{display:block;font-size:14px;font-weight:600;line-height:1.3;}
.home-tw .desc{display:block;font-size:12px;color:var(--text3);line-height:1.3;}
.home-btn .chev{font-size:18px;color:var(--text4);flex-shrink:0;}
.home-badge{position:absolute;top:12px;right:40px;background:var(--red);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center;display:none;align-items:center;justify-content:center;}

/* ── 앱 화면 ── */
#screen{display:none;flex-direction:column;min-height:100dvh;max-width:var(--app-w);margin:0 auto;width:100%;}
.top-bar{min-height:52px;background:var(--card);border-bottom:.5px solid var(--border);display:flex;align-items:center;padding:env(safe-area-inset-top) 16px 0;gap:10px;position:sticky;top:0;z-index:200;}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--blue);background:none;border:none;cursor:pointer;padding:0;white-space:nowrap;font-family:inherit;}
.back-btn i{font-size:17px;}
.top-bar h2{font-size:15px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.screen-body{padding:16px 18px calc(28px + env(safe-area-inset-bottom));}
.section{display:none;}

/* ── 버튼 ── */
.btn-primary,.btn-secondary,.btn-green,.btn-red{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 13px;border-radius:8px;border:.5px solid var(--blue);background:var(--blue);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-primary:disabled{background:#bcd0e4;border-color:#bcd0e4;cursor:default;}
.btn-secondary{background:#fff;color:var(--text2);border-color:#ccc;}
.btn-secondary:hover{background:#f5f5f3;}
.btn-green{background:var(--green);border-color:var(--green);}
.btn-red{background:var(--red);border-color:var(--red);}

.field-label{font-size:12px;color:var(--text2);font-weight:500;display:block;margin-bottom:5px;}
.required{color:var(--red);}
.sub-hint{font-size:12px;color:var(--text4);margin-top:6px;}
.form-group{margin-bottom:16px;}
select,input[type=date],input[type=time],input[type=text],input[type=number],input[type=password],textarea{padding:9px 11px;border:.5px solid #ccc;border-radius:9px;font-size:14px;font-family:inherit;width:100%;background:#fff;color:var(--text1);}
textarea{resize:vertical;min-height:64px;}
.two-col{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:14px;}
.static-field{min-height:42px;padding:9px 11px;border:.5px solid var(--border2);border-radius:9px;background:#fafaf8;color:var(--text1);font-size:14px;font-weight:500;display:flex;align-items:center;gap:7px;}
.fs-pin{color:var(--blue);font-size:16px;}

.empty{text-align:center;padding:34px 16px;color:var(--text4);font-size:13px;}
.section-title{font-size:13px;font-weight:600;color:var(--text1);margin:22px 0 12px;}

/* ── 사업장 선택 ── */
.pick-title{font-size:16px;font-weight:600;margin:4px 0 14px;}
.site-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.site-pick{display:flex;align-items:center;gap:11px;padding:12px 13px;border:.5px solid var(--border);border-radius:11px;background:var(--card);cursor:pointer;font-family:inherit;text-align:left;transition:transform .12s,border-color .15s,box-shadow .15s;}
.site-pick:hover{border-color:var(--blue);box-shadow:0 2px 10px rgba(0,0,0,.06);}
.site-pick:active{transform:scale(.97);}
.sp-icon{width:34px;height:34px;border-radius:9px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sp-name{font-size:14px;font-weight:500;line-height:1.3;}

/* ── 현재 사업장 바 ── */
.site-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 14px;border:.5px solid var(--border);border-radius:11px;background:var(--card);margin-bottom:14px;}
.sb-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;}
.sb-left i{color:var(--blue);font-size:17px;}
.site-change{background:#fff;border:.5px solid #ccc;border-radius:8px;padding:6px 13px;font-size:13px;color:var(--text2);cursor:pointer;font-family:inherit;}

/* ── 아코디언 ── */
.acc{background:var(--card);border:.5px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden;}
.acc.open{border-color:var(--blue-border);box-shadow:0 4px 16px rgba(43,108,176,.10);margin:6px 0 18px;}
.acc-head{width:100%;display:flex;align-items:center;gap:11px;padding:12px 14px;background:none;border:none;cursor:pointer;font-family:inherit;}
.acc-icon{width:34px;height:34px;border-radius:9px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.acc-tw{flex:1;text-align:left;min-width:0;}
.acc-name{font-size:14px;font-weight:600;display:block;}
.acc-count{font-size:12px;color:var(--text4);display:block;margin-top:2px;}
.acc-chev{font-size:18px;color:var(--text4);transition:transform .2s;flex-shrink:0;}
.acc.open .acc-chev{transform:rotate(180deg);}
.acc-body{display:none;border-top:.5px solid var(--border);background:#fbfcfd;}
.acc.open .acc-body{display:block;}
.acc.open .acc-head{background:var(--blue-light);}
.acc.open .acc-icon{background:var(--blue);color:#fff;}
.dl-badge{min-width:20px;height:20px;padding:0 6px;margin-right:2px;border-radius:99px;background:var(--red);color:#fff;font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.item-grid{display:flex;flex-direction:column;gap:0;padding:4px 14px 8px 18px;position:relative;}
.item-grid::before{content:'';position:absolute;left:22px;top:6px;bottom:14px;width:2px;background:var(--blue-border);border-radius:2px;opacity:.6;}
.grid-item{display:flex;align-items:center;gap:10px;padding:10px 12px 10px 14px;border:none;border-bottom:.5px solid #eceae6;border-radius:0;background:transparent;cursor:pointer;font-family:inherit;text-align:left;transition:background .15s;width:100%;}
.grid-item:last-child{border-bottom:none;}
.grid-item:hover{background:#eef4fb;border-radius:8px;}
.gi-icon{width:28px;height:28px;border-radius:7px;background:#fff;border:.5px solid var(--border);color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.gi-label{flex:1;min-width:0;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gi-dl{flex-shrink:0;font-size:11px;font-weight:600;color:#fff;background:var(--red);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.gi-arrow{color:var(--text4);font-size:16px;flex-shrink:0;}
.grid-item.soon{cursor:default;opacity:.6;}
.grid-item.soon:hover{border-color:var(--border2);background:#fafaf8;}
.gi-soon{font-size:11px;color:var(--text4);background:#eee;padding:2px 8px;border-radius:99px;flex-shrink:0;}

/* ── 업로드 헤더 ── */
.brand-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:14px;flex-wrap:wrap;}
.bb-main{display:flex;align-items:center;gap:6px;min-width:0;flex-wrap:wrap;}
.bb-co{font-size:13px;font-weight:700;color:var(--blue);}
.bb-sep{font-size:13px;color:var(--text4);}
.bb-site{font-size:14px;font-weight:600;}
.bb-mgr{font-size:13px;color:var(--text2);font-weight:500;}
.site-change{background:#fff;border:.5px solid #ccc;border-radius:8px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-family:inherit;flex-shrink:0;}
.cnt-dot{min-width:22px;height:22px;padding:0 6px;border-radius:99px;color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:3px;}
.cnt-dot.red{background:var(--red);}
.cnt-dot.green{background:var(--green);}
.panel{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.panel-title{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;}
.panel-title i{font-size:18px;color:var(--blue);}
.dl-inline{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dl-inline:empty{display:none;}
.dl-txt{font-size:12px;color:var(--text2);}
.pp-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.pp-ic{font-size:18px;color:var(--blue);flex-shrink:0;}
.pp-row select,.pp-row input[type=date]{width:auto;flex:0 0 auto;}
.pp-suffix{font-size:14px;font-weight:600;color:var(--text1);}
.pp-now{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-light);border:.5px solid var(--blue-border);border-radius:8px;padding:7px 11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.pp-now:hover{background:#d9e9fa;}
.shared-chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--amber);background:var(--amber-light);padding:2px 8px;border-radius:99px;vertical-align:middle;}
.dl-clear{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border:.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text3);cursor:pointer;flex-shrink:0;}
.dl-clear:hover{background:#f5f5f3;color:var(--red);}
/* ── 업로드 항목 헤더 ── */
.form-hero{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.fh-icon{width:40px;height:40px;border-radius:11px;background:var(--blue-light);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.fh-title{font-size:18px;font-weight:600;}
.fh-sub{font-size:12px;color:var(--text4);margin-top:1px;}

/* ── 마감 배너 ── */
.deadline-banner{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-radius:10px;background:#fafaf8;border:.5px solid var(--border);font-size:13px;color:var(--text2);margin-bottom:14px;}
.deadline-banner:empty{display:none;}
.dl-pill{font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;}
.dl-done{background:var(--green-light);color:var(--green);}
.dl-late{background:var(--red-light);color:var(--red);}
.dl-soon{background:var(--amber-light);color:var(--amber);}
.dl-open{background:var(--blue-light);color:var(--blue);}

/* ── 슬롯 ── */
.slot-row{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.slot-row.done{background:#f6faef;border-color:var(--green-border);}
.slot-row.single{background:transparent;border:none;padding:0;margin-bottom:0;}
.slot-row.single .slot-head{margin-bottom:8px;}
.slot-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.slot-name{font-size:14px;font-weight:600;}
.badge-done{font-size:11px;font-weight:600;color:var(--green);display:inline-flex;align-items:center;gap:3px;}
.badge-done i{font-size:13px;}
.new-tag{display:inline-flex;align-items:center;font-size:10px;font-weight:700;color:#fff;background:var(--red);padding:1px 6px;border-radius:99px;vertical-align:middle;letter-spacing:.3px;}
.ir-new{min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--red);color:#fff;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;}
.redo-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;padding:7px 12px;border:.5px solid var(--blue-border);border-radius:8px;background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.redo-btn:hover{background:#d9e9fa;}
.edit-row{display:flex;gap:8px;margin-top:10px;}
.edit-row .redo-btn{margin-top:0;}
.del-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:.5px solid var(--red-border);border-radius:8px;background:var(--red-light);color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.del-btn:hover{background:#fbe0e0;}
.lock-note{display:flex;align-items:center;gap:5px;margin-top:10px;font-size:12px;color:var(--text4);}
.lock-note i{font-size:14px;}
.appr-dl{font-size:12px;font-weight:600;color:var(--red);display:flex;align-items:center;gap:5px;}
.hist-grp{margin-bottom:16px;}
.hist-grp:last-child{margin-bottom:0;}
.hist-grp-head{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--text2);margin:0 2px 9px;padding-bottom:7px;border-bottom:1px solid var(--border);}
.hp-now{font-size:10px;font-weight:700;color:#fff;background:var(--green);padding:1px 7px;border-radius:99px;}
.hi-card{background:#fafbfc;border:.5px solid var(--border);border-radius:11px;padding:11px 12px;margin-bottom:8px;}
.hi-card:last-child{margin-bottom:0;}
.hi-row1{display:flex;align-items:center;gap:7px;margin-bottom:10px;}
.hi-ic{font-size:17px;color:var(--blue);flex-shrink:0;}
.hi-name{flex:1;min-width:0;font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hi-dl{text-align:left;background:none;border:none;font-family:inherit;color:var(--blue);text-decoration:underline;text-underline-offset:2px;cursor:pointer;padding:0;}
.file-link{display:inline-flex;align-items:center;gap:5px;background:var(--blue-light);border:.5px solid var(--blue-border);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:13px;font-weight:600;color:var(--blue);cursor:pointer;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-link:active{background:#d9e9fa;}
.file-link i{flex-shrink:0;}
.hl-slot{font-size:10.5px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:2px 7px;border-radius:99px;flex-shrink:0;}
.hi-row2{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hi-when{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--text4);white-space:nowrap;}
.hi-when i{font-size:13px;}
.hi-acts{display:flex;gap:6px;flex-shrink:0;}
.st-pill.edit{background:var(--amber-light);color:var(--amber);}
.st-pill.wait{background:#eef0f3;color:var(--text3);}
.hist-btn{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;color:var(--text2);background:#fff;border:.5px solid var(--border);border-radius:8px;padding:6px 9px;cursor:pointer;font-family:inherit;}
.hist-btn:active{background:#eaeae6;}
.hist-btn.del{color:var(--red);}
.slot-note{display:flex;align-items:center;gap:5px;margin-top:9px;font-size:12px;color:var(--text3);background:#f6f7f5;border-radius:8px;padding:8px 10px;}
.slot-note i{color:var(--green);}
.form-tabs{display:flex;gap:6px;margin:2px 0 12px;}
.form-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 8px;border:.5px solid var(--border);border-radius:9px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;}
.form-tab i{font-size:15px;}
.form-tab.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.step-sub{font-size:11px;font-weight:600;color:var(--text4);}
.step-now.cur{color:var(--text4);}
.btn-upload{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border:1px dashed var(--blue-border);border-radius:10px;background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:500;cursor:pointer;}
.btn-upload.has{border-style:solid;}
.btn-upload input{display:none;}
.thumb{max-width:120px;max-height:120px;border-radius:8px;margin-top:8px;cursor:pointer;border:.5px solid var(--border);}
.file-line{font-size:13px;color:var(--text2);}
.file-line a{color:var(--blue);}
.form-fields{display:flex;flex-direction:column;gap:8px;}
.submit-wrap{margin-top:6px;}
.btn-submit{width:100%;padding:11px;border-radius:10px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-submit:disabled{background:#bcd0e4;cursor:default;}

/* ── 결재 카드 ── */
.appr-card{background:var(--card);border:.5px solid var(--border);border-radius:11px;padding:12px;margin-bottom:9px;}
.appr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.appr-title{font-size:14px;font-weight:600;}
.appr-meta{font-size:12px;color:var(--text3);margin-top:3px;}
.appr-amt{font-size:14px;font-weight:600;color:var(--blue);white-space:nowrap;}
.appr-reason{font-size:13px;color:var(--text2);background:#fafaf8;border-radius:8px;padding:8px 10px;margin-top:10px;}
.appr-actions{display:flex;gap:8px;margin-top:10px;}
.appr-actions button{flex:1;}
.status-pill{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;}
.st-approved{background:var(--green-light);color:var(--green);}
.st-rejected{background:var(--red-light);color:var(--red);}
.st-pending{background:var(--amber-light);color:var(--amber);}
.appr-sec-title{font-size:13px;font-weight:700;color:var(--text2);margin:4px 2px 10px;}
.appr-card.done{opacity:.92;background:#fafafa;}
.st-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;margin-left:4px;}
.st-pill.ok{background:var(--green-light);color:var(--green);}
.st-pill.no{background:var(--red-light);color:var(--red);}

/* ── 잠금 ── */
.lock-box{background:var(--card);border:.5px solid var(--border);border-radius:14px;padding:22px;max-width:360px;margin:30px auto;}

/* ── 관리자 현황 ── */
.admin-controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.admin-controls input[type=date]{width:auto;}
.grid-wrap{overflow-x:auto;border:.5px solid var(--border);border-radius:12px;background:var(--card);}
.matrix{border-collapse:collapse;font-size:12px;width:100%;}
.matrix th,.matrix td{border:.5px solid var(--border);padding:7px 6px;text-align:center;white-space:nowrap;}
.matrix th{background:#fafaf8;font-weight:500;color:var(--text2);position:sticky;top:0;}
.matrix th.site,.matrix td.site{text-align:left;position:sticky;left:0;background:#fafaf8;font-weight:500;z-index:1;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
.cell{cursor:pointer;font-weight:600;}
.cell-done{background:var(--green-light);color:var(--green);}
.cell-part{background:var(--amber-light);color:var(--amber);}
.cell-late{background:var(--red-light);color:var(--red);}
.cell-none{color:var(--text4);}
.cell-na{color:#ccc;}
.setting-block{background:var(--card);border:.5px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.dl-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0ec;}
.dl-row:last-child{border-bottom:none;}
.dl-row .nm{font-size:13px;font-weight:500;}
.dl-row input[type=time]{width:auto;}
.dl-row input[type=number]{width:90px;}
.dl-item{padding:11px 0;border-bottom:.5px solid #f0f0ec;}
.dl-item:last-child{border-bottom:none;}
.dl-item-name{font-size:13px;font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dl-item-grp{font-size:11px;color:var(--text4);font-weight:400;}
.dl-item-ctl{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.dl-item-ctl input[type=date]{width:auto;flex:1;min-width:140px;}
.dl-item-ctl select,.dl-item-ctl input[type=time]{width:auto;}
.dl-cat{background:var(--card);border:.5px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden;}
.dl-cat-head{width:100%;display:flex;align-items:center;gap:8px;padding:13px 15px;background:none;border:none;cursor:pointer;font-family:inherit;}
.dl-cat-head>i:first-child{font-size:17px;color:var(--blue);}
.dlc-name{flex:1;text-align:left;font-size:14px;font-weight:600;}
.dlc-cnt{min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:var(--red);color:#fff;font-size:11px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;}
.dlc-chev{font-size:16px;color:var(--text4);transition:transform .2s;}
.dl-cat-body{display:none;border-top:.5px solid var(--border);padding:4px 15px 10px;}
.dl-cat-body.open{display:block;}
.sm-row{background:var(--card);border:.5px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.sm-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sm-name{font-size:14px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sm-actions{display:flex;gap:6px;flex-shrink:0;}
.btnxs{padding:5px 9px;font-size:12px;}
.sm-mgr{display:flex;align-items:center;gap:8px;margin-top:9px;}
.sm-mgr>span{font-size:12px;color:var(--text3);flex-shrink:0;}
.sm-mgr select{flex:1;}
.sm-edit{margin-top:11px;padding-top:11px;border-top:.5px solid var(--border);display:flex;flex-direction:column;gap:9px;}
.sm-meals{display:flex;flex-direction:column;gap:7px;}
.meal-day{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.md-label{font-size:12px;font-weight:600;color:var(--text2);width:32px;flex-shrink:0;}
.md-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:4px 9px;border:.5px solid var(--border);border-radius:99px;cursor:pointer;user-select:none;}
.md-chip input{margin:0;width:auto;}
.gi-done{flex-shrink:0;display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:99px;white-space:nowrap;}
.gi-done i{font-size:13px;}
.cat-sec{margin-bottom:18px;background:#f7f8f9;border:.5px solid #e6e8eb;border-radius:14px;padding:12px 12px 4px;}
.cat-sec-head{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:var(--text1);margin:2px 2px 12px;padding-bottom:9px;border-bottom:1.5px solid #e6e8eb;}
.cat-sec-head i{font-size:18px;color:var(--text3);}
.item-rec{background:var(--card);border:.5px solid var(--border);border-radius:11px;margin-bottom:8px;overflow:hidden;}
.item-rec-head{width:100%;display:flex;align-items:center;gap:10px;padding:13px 15px;background:none;border:none;cursor:pointer;font-family:inherit;}
.ir-name{flex:1;text-align:left;font-size:14px;font-weight:500;}
.ir-cnt{font-size:12px;color:var(--text3);white-space:nowrap;}
.ir-period{font-size:11px;font-weight:600;color:var(--text3);background:#eef0f2;padding:1px 7px;border-radius:99px;margin-left:4px;}
.ir-chev{font-size:16px;color:var(--text4);transition:transform .2s;flex-shrink:0;}
.item-rec-body{max-height:0;overflow:hidden;border-top:0 solid var(--border);background:#fbfcfd;transition:max-height .26s ease,border-top-width .26s;}
.item-rec-body.open{max-height:1600px;border-top-width:.5px;}
.rec-row{display:flex;align-items:center;gap:8px;padding:10px 15px;border-bottom:.5px solid #f0f0ec;cursor:pointer;}
.rec-row:last-child{border-bottom:none;}
.rec-row:hover{background:#eef4fb;}
.rec-site{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rec-mgr{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:45%;}
.rec-cnt{font-size:12px;font-weight:600;color:var(--blue);flex-shrink:0;}
.rec-empty{padding:13px 15px;color:var(--text4);font-size:13px;}
.sub-group{border-top:.5px solid var(--border);}
.sub-head{width:100%;display:flex;align-items:center;gap:8px;padding:11px 15px;background:#fafaf8;border:none;cursor:pointer;font-family:inherit;}
.sg-i{font-size:16px;flex-shrink:0;}
.sg-i.green{color:var(--green);}
.sg-i.red{color:var(--red);}
.sg-lbl{flex:1;text-align:left;font-size:13px;font-weight:600;}
.sg-chev{font-size:15px;color:var(--text4);transition:transform .2s;flex-shrink:0;}
.sub-body{display:none;}
.sub-body.open{display:block;}
.rec-att{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:4px 10px;border-radius:8px;flex-shrink:0;white-space:nowrap;}
.rec-form{font-size:12px;color:var(--text2);text-align:right;flex-shrink:0;}
.rec-row.mis{color:var(--text3);}
.rec-row.mis .rec-site{font-weight:400;}
.rec-wait{font-size:14px;color:var(--text4);}
.dl-all{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:#fff;background:var(--blue);padding:4px 11px;border-radius:8px;flex-shrink:0;}
.dl-all:hover{background:var(--blue-dark);}

/* ── 관리자 탭 ── */
.admin-tabs{display:flex;gap:5px;margin-bottom:14px;background:#eef0f3;padding:4px;border-radius:11px;}
.admin-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 6px;border:none;background:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;}
.admin-tab.active{background:#fff;color:var(--blue);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.admin-tab i{font-size:15px;}
.tab-badge{display:none;align-items:center;justify-content:center;min-width:17px;height:17px;padding:0 5px;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;}
.admin-pane{animation:fade .2s;}
@keyframes fade{from{opacity:0;}to{opacity:1;}}
.dl-settings-wrap{margin-bottom:16px;}
.dl-toggle{width:100%;display:flex;align-items:center;gap:8px;padding:13px 15px;background:var(--card);border:.5px solid var(--border);border-radius:11px;font-family:inherit;font-size:14px;font-weight:600;color:var(--text1);cursor:pointer;}
.dl-toggle-chev{margin-left:auto;transition:transform .2s;color:var(--text4);}
.dl-grp{font-size:11px;font-weight:600;color:var(--text4);background:#f0f1f3;padding:1px 7px;border-radius:99px;}
.item-wrap{margin-bottom:8px;}
.step-wrap{display:flex;flex-direction:column;gap:7px;}
.step-row{display:flex;align-items:center;gap:7px;}
.step-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;border:.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text2);cursor:pointer;flex-shrink:0;font-size:17px;}
.step-btn:active{background:#e9e9e5;}
.step-mid{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:#f6f6f4;border:.5px solid var(--border);border-radius:10px;padding:6px;min-width:0;}
.step-lbl{font-size:13.5px;font-weight:700;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.step-sub{font-size:11px;font-weight:600;color:var(--text4);}
.step-now-chip{display:inline-flex;align-items:center;gap:3px;height:40px;padding:0 9px;border:.5px solid var(--blue-border);border-radius:9px;background:var(--blue-light);color:var(--blue);font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.step-now-chip:active{background:#d9e9fa;}
.step-now-chip i{font-size:13px;}
.ip-box .step-now-chip{height:36px;}
.cat-chips{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
.cat-chip{flex:1 0 auto;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 13px;border:.5px solid var(--border);border-radius:9px;background:#fff;font-family:inherit;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;white-space:nowrap;}
.cat-chip i{font-size:15px;}
.cat-chip.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.appr-chips{flex-wrap:nowrap;}
.appr-chips .cat-chip{flex:0 0 auto;}
.chip-n{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;background:var(--red);color:#fff;border-radius:99px;font-size:10px;font-weight:700;}
.cat-chip.active .chip-n{background:#fff;color:var(--blue);}
.ip-box{padding:10px 11px;background:#fbfbf9;border-bottom:.5px solid var(--border);}
.ip-box.mv{border:.5px solid var(--border);border-radius:11px;margin:8px 0;}
.ip-box .step-btn{width:36px;height:36px;font-size:15px;}
.appr-group{margin-bottom:18px;}
.appr-group-head{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:700;color:var(--text1);padding:2px 2px 10px;border-bottom:1.5px solid #e6e8eb;margin-bottom:10px;}
.appr-group-head i{font-size:17px;color:var(--text3);}
.ag-n{margin-left:auto;font-size:12px;font-weight:600;color:var(--text3);}
.appr-done-lbl{font-size:12px;font-weight:600;color:var(--text4);margin:6px 2px 8px;}
.search-row{display:flex;align-items:center;gap:7px;padding:9px 11px;background:#f6f6f4;border:.5px solid var(--border);border-radius:9px;margin:8px 0;}
.search-row i{font-size:15px;color:var(--text4);}
.search-row input{flex:1;border:none;background:none;font-size:13px;padding:2px 0;outline:none;font-family:inherit;}
.search-x{background:none;border:none;color:var(--text4);cursor:pointer;padding:2px;display:flex;}
.edit-tag{font-size:10px;font-weight:700;color:#fff;background:var(--amber);padding:1px 6px;border-radius:99px;}
.set-sec-title{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:var(--text1);margin:0 0 12px;}
.set-sec-title i{font-size:18px;color:var(--blue);}
.list-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:11px 13px;border:.5px solid var(--border);border-radius:10px;background:#fafbfc;font-family:inherit;font-size:13px;font-weight:600;color:var(--text1);cursor:pointer;}
.list-toggle span{display:flex;align-items:center;gap:7px;}
.list-toggle i{font-size:16px;color:var(--text3);}
.list-toggle:active{background:#f0f0ec;}
.lock-note.done{color:var(--green);}
.lock-note.done i{color:var(--green);}
/* ── 액션 시트 / 공지 ── */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:960;align-items:flex-end;justify-content:center;}
.sheet-overlay.open{display:flex;animation:fade .15s;}
.sheet{width:100%;max-width:var(--app-w);background:#fff;border-radius:18px 18px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;animation:sheetup .2s;}
@keyframes sheetup{from{transform:translateY(40px);}to{transform:translateY(0);}}
.sheet-head{font-size:15px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:4px;word-break:break-all;}
.sheet-body{font-size:14px;color:var(--text2);max-height:50vh;overflow:auto;}
.att-btn{width:100%;justify-content:center;}
.att-cancel{width:100%;padding:12px;background:none;border:none;color:var(--text3);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}

/* ── 오버레이 ── */
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.78);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.loading.show{display:flex;}
.spinner{width:38px;height:38px;border:3px solid var(--blue-light);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.img-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:950;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
.img-modal.open{display:flex;}
.img-modal img{max-width:100%;max-height:100%;border-radius:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);background:#1a1a18;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}

/* iOS 입력 시 확대 방지 + 폰 최적화 */
@media(max-width:600px){
 .screen-body{padding:14px 14px calc(28px + env(safe-area-inset-bottom));}
 input,select,textarea{font-size:16px !important;}
 .cat-chips{margin-left:-2px;margin-right:-2px;padding-left:2px;padding-right:2px;}
}
@media(min-width:481px){
 .toast{bottom:32px;}
}
</style>
</head>
<body>

<!-- ===== 홈 ===== -->
<div id="home-screen">
  <div class="home-logo"><i class="ti ti-cloud-upload"></i> 온정 F&amp;B</div>
  <div class="home-sub">사업장 문서 업로드 시스템</div>
  <div class="home-menu">
    <button class="home-btn" onclick="openSubmit()">
      <span class="home-ic blue"><i class="ti ti-upload"></i></span>
      <span class="home-tw"><span class="lbl">영양사 업로드</span><span class="desc">담당 사업장 문서 제출</span></span>
      <i class="ti ti-chevron-right chev"></i>
    </button>
    <button class="home-btn" onclick="openAdmin()">
      <span class="home-ic amber"><i class="ti ti-layout-dashboard"></i></span>
      <span class="home-tw"><span class="lbl">관리자</span><span class="desc">제출현황 · 결재함 · 사업장</span></span>
      <span class="home-badge" id="home-badge-admin"></span>
      <i class="ti ti-chevron-right chev"></i>
    </button>
  </div>
</div>

<!-- ===== 앱 화면 ===== -->
<div id="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="history.back()"><i class="ti ti-arrow-left"></i> 뒤로</button>
    <h2 id="screen-title"></h2>
  </div>
  <div class="screen-body">

    <!-- 영양사 업로드 -->
    <div class="section" id="sec-submit">
      <div class="form-group" id="name-group">
        <label class="field-label">내 이름 <span class="required">*</span></label>
        <select id="manager-select" onchange="onManagerChange()"><option value="">이름 선택</option></select>
        <div class="sub-hint" id="site-hint"></div>
      </div>
      <select id="site-select" style="display:none;"></select>

      <div id="nav-area"></div>

      <div id="form-area" style="display:none;">
        <div id="form-header"></div>
        <div class="form-tabs" id="form-tabs">
          <button id="ftab-submit" class="form-tab active" onclick="showFormTab('submit')"><i class="ti ti-upload"></i> 제출하기</button>
          <button id="ftab-history" class="form-tab" onclick="showFormTab('history')"><i class="ti ti-history"></i> 제출이력</button>
        </div>
        <div id="submit-pane">
          <div class="panel">
            <div class="panel-head"><span class="dl-inline" id="dl-inline"></span></div>
            <div id="period-area"></div>
            <div id="submit-body"></div>
            <div class="submit-wrap" id="submit-wrap" style="display:none;">
              <button class="btn-submit" id="btn-submit" onclick="submitSlots()">제출</button>
            </div>
          </div>
          <div id="extra-area"></div>
        </div>
        <div id="history-area" style="display:none;"></div>
      </div>
    </div>

    <!-- 관리자 -->
    <div class="section" id="sec-admin">
      <div id="admin-lock">
        <div class="lock-box">
          <div style="font-size:16px;font-weight:600;margin-bottom:6px;">관리자</div>
          <div style="font-size:13px;color:var(--text2);margin-bottom:14px;">비밀번호를 입력하세요.</div>
          <div style="display:flex;gap:8px;">
            <input type="password" id="admin-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')unlockAdmin()" />
            <button class="btn-primary" onclick="unlockAdmin()">확인</button>
          </div>
          <div id="admin-pw-err" style="font-size:12px;color:var(--red);margin-top:8px;min-height:16px;"></div>
        </div>
      </div>
      <div id="admin-content" style="display:none;">
        <div class="admin-tabs">
          <button class="admin-tab active" id="tab-status" onclick="showAdminTab('status')"><i class="ti ti-layout-dashboard"></i> 제출현황</button>
          <button class="admin-tab" id="tab-approval" onclick="showAdminTab('approval')"><i class="ti ti-checkbox"></i> 결재함 <span class="tab-badge" id="tab-badge-approval"></span></button>
          <button class="admin-tab" id="tab-settings" onclick="showAdminTab('settings')"><i class="ti ti-settings"></i> 설정</button>
        </div>

        <div class="admin-pane" id="pane-status">
          <div id="matrix-wrap"></div>
        </div>

        <div class="admin-pane" id="pane-approval" style="display:none;">
          <div id="approval-wrap"><div class="empty">대기 중인 결재가 없습니다</div></div>
        </div>

        <div class="admin-pane" id="pane-settings" style="display:none;">
          <div class="set-sec-title"><i class="ti ti-alarm"></i> 마감기한 설정</div>
          <div class="setting-block" id="deadline-settings"></div>
          <div class="set-sec-title" style="margin-top:22px;"><i class="ti ti-building-factory-2"></i> 사업장 설정</div>
          <div class="setting-block" id="site-summary"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><div style="font-size:14px;color:var(--text2);" id="loading-text">처리 중...</div></div>
<div class="img-modal" id="modal" onclick="this.classList.remove('open')"><img id="modal-img" src="" /></div>
<div class="sheet-overlay" id="notice-overlay">
  <div class="sheet">
    <div class="sheet-head"><i class="ti ti-bell"></i> 마감기한 공지</div>
    <div class="sheet-body" id="notice-body"></div>
    <button class="btn-primary" style="width:100%;" onclick="dismissNotice()">확인했어요</button>
  </div>
</div>

const WEEKDAY=['일','월','화','수','목','금','토'];
function ymd(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function p2(n){return String(n).padStart(2,'0');}
function md(d){return `${p2(d.getMonth()+1)}/${p2(d.getDate())}`;}
function prevMonth(ym){let [y,m]=ym.split('-').map(Number);m--;if(m<1){m=12;y--;}return `${y}-${String(m).padStart(2,'0')}`;}
function weekStart(dateStr){
  const d=new Date((dateStr||todayStr)+'T12:00:00');
  const day=d.getDay();const diff=(day===0?-6:1-day);
  d.setDate(d.getDate()+diff);
  return ymd(d);
}
function curDataWeek(dateStr){
  const mon=new Date(weekStart(dateStr)+'T12:00:00');
  const wed=new Date(mon);wed.setDate(mon.getDate()+2);wed.setHours(23,59,59,0);
  const t=new Date((dateStr||todayStr)+'T12:00:00');
  if(t.getTime()<=wed.getTime())mon.setDate(mon.getDate()-7);
  return ymd(mon);
}
function ymwFromWeekStart(ws){const mon=new Date(ws+'T12:00:00');return {year:mon.getFullYear(),month:mon.getMonth()+1,week:Math.ceil(mon.getDate()/7)};}
function weekLabel(ws){const w=ymwFromWeekStart(ws);return `${w.month}월 ${w.week}주차`;}
function weekStartFromYMW(y,m,w){
  const mons=[];for(let d=1;d<=31;d++){const dt=new Date(y,m-1,d,12);if(dt.getMonth()!==m-1)break;if(dt.getDay()===1)mons.push(d);}
  let pick=mons.find(d=>Math.ceil(d/7)===w);if(!pick)pick=mons[Math.min(w-1,mons.length-1)]||mons[0]||1;
  return ymd(new Date(y,m-1,pick,12));
}
function weekCount(y,m){let n=0;for(let d=1;d<=31;d++){const dt=new Date(y,m-1,d,12);if(dt.getMonth()!==m-1)break;if(dt.getDay()===1)n++;}return n||5;}
function periodOf(typeKey,date){
  const t=TYPES[typeKey];
  if(t.period==='weekly'){
    if(t.weekKind==='next'){const mon=new Date(weekStart(date)+'T12:00:00');mon.setDate(mon.getDate()+7);return ymd(mon);}
    return curDataWeek(date);
  }
  if(t.period==='monthly'){let ym=date.slice(0,7);if(t.prevMonth)ym=prevMonth(ym);return ym;}
  if(t.period==='yearly')return date.slice(0,4);
  return date;
}
function periodLabel(typeKey,period){
  const t=TYPES[typeKey];
  if(t.period==='weekly'){
    const mon=new Date(period+'T12:00:00'),sun=new Date(mon);sun.setDate(mon.getDate()+6);
    return `${weekLabel(period)} (${md(mon)}~${md(sun)})`;
  }
  if(t.period==='monthly')return `${Number(period.split('-')[1])}월`;
  if(t.period==='yearly')return `${period}년`;
  const p=period.split('-');return `${Number(p[1])}/${Number(p[2])}`;
}
function hasDeadline(typeKey){const t=TYPES[typeKey];if(t.noDeadline)return false;return t.period==='weekly'||!!(DEADLINES[typeKey]&&DEADLINES[typeKey].date);}
function deadlineOf(typeKey,periodKey){
  const t=TYPES[typeKey];
  if(t.period==='weekly'){
    const ws=new Date(periodKey+'T12:00:00');
    const base=new Date(ws);base.setDate(ws.getDate()+(t.weekKind==='next'?-7:7));
    const defD=(t.weekKind==='next'?0:3);
    const D=(DEADLINES[typeKey]&&DEADLINES[typeKey].dow!=null)?DEADLINES[typeKey].dow:defD;
    const off=(D===0?6:D-1);
    base.setDate(base.getDate()+off);base.setHours(23,59,59,0);return base;
  }
  const r=DEADLINES[typeKey];if(!r||!r.date)return null;
  return new Date(r.date+'T23:59:59');
}
function fmtDeadlineOf(typeKey,periodKey){
  const dt=deadlineOf(typeKey,periodKey);if(!dt)return '';
  return `마감일: ${md(dt)}(${WEEKDAY[dt.getDay()]})`;
}
function fmtWhen(iso){if(!iso)return '';const d=new Date(iso);return `${md(d)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function expectedSlots(typeKey,site,date){
  const t=TYPES[typeKey];
  if(t.kind==='approval')return[];
  if(t.slot==='meals')return getMeals(site,date);
  return['기본'];
}

async function loadConfig(){
  try{
    const s=await getDoc(doc(db,'config','settings'));
    if(s.exists()){const d=s.data();if(d.managers)MANAGERS=d.managers;if(d.siteMeals)SITE_MEALS=d.siteMeals;}
    const dl=await getDoc(doc(db,'config','deadlines'));
    if(dl.exists())DEADLINES=dl.data().rules||{};
  }catch(e){console.error('config 로드 실패',e);}
}
async function saveDeadlines(){await setDoc(doc(db,'config','deadlines'),{rules:DEADLINES,updatedAt:new Date().toISOString()});}

async function init(){
  showLoading('불러오는 중...');
  await loadConfig();
  hideLoading();
  const mSel=$('manager-select');
  [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>mSel.appendChild(new Option(m.name+(m.phone?' · '+m.phone:''),mgrKey(m))));
  const saved=localStorage.getItem('savedManager');
  if(saved){const m=MANAGERS.find(x=>mgrKey(x)===saved)||MANAGERS.find(x=>x.name===saved);if(m){mSel.value=mgrKey(m);onManagerChange();}}
  let restore=null;try{restore=JSON.parse(sessionStorage.getItem('navState')||'null');}catch(e){}
  let start={screen:'home'};
  if(restore&&restore.screen==='admin')start={screen:'admin'};
  else if(restore&&restore.screen==='submit')start={screen:'submit',view:(restore.view==='form'?'site':(restore.view||'site'))};
  history.replaceState(start,'');
  applyState(start);
  checkNotice();
}

function go(st){history.pushState(st,'');applyState(st);}
window.openSubmit=function(){go({screen:'submit',view:'site'});};
window.openAdmin=function(){go({screen:'admin'});};
function applyState(st){
  st=st||{screen:'home'};curScreen=st.screen;
  try{sessionStorage.setItem('navState',JSON.stringify({screen:st.screen,view:st.view||(st.screen==='submit'?navView:undefined)}));}catch(e){}
  if(st.screen==='home'){$('home-screen').style.display='flex';$('screen').style.display='none';updateHomeBadge();return;}
  $('home-screen').style.display='none';$('screen').style.display='flex';
  const titles={submit:'영양사 업로드',admin:'관리자'};
  $('screen-title').textContent=titles[st.screen]||'';
  ['submit','admin'].forEach(s=>$('sec-'+s).style.display=s===st.screen?'block':'none');
  if(st.screen==='submit')applySubmitView(st.view||'site');
  window.scrollTo({top:0,behavior:'auto'});
}
function applySubmitView(view){
  navView=view;
  $('name-group').style.display=(view==='site')?'block':'none';
  if(view==='form'){$('nav-area').style.display='none';$('form-area').style.display='block';if(curType)renderForm();}
  else{$('form-area').style.display='none';$('nav-area').style.display='block';renderNav();}
}
window.addEventListener('popstate',e=>applyState(e.state));

async function updateHomeBadge(){
  try{
    const snap=await getDocs(query(collection(db,'records'),where('viewed','==',false)));
    const n=snap.size;
    const b=$('home-badge-admin');if(b){b.style.display=n>0?'inline-flex':'none';b.textContent=n;}
  }catch(e){}
}

// ── 사업장 선택 → 카테고리 아코디언 → 항목 ──
function accordionHtml(){
  return GROUP_ORDER.map(g=>{
    const open=expandedGroup===g;
    const keys=Object.keys(TYPES).filter(k=>TYPES[k].group===g).sort((a,b)=>(TYPES[a].ready?0:1)-(TYPES[b].ready?0:1));
    const readyN=keys.filter(k=>TYPES[k].ready).length;
    const dlKeys=keys.filter(k=>TYPES[k].ready&&hasDeadline(k));
    const redN=dlKeys.filter(k=>!siteDone[k]).length;
    const greenN=dlKeys.filter(k=>siteDone[k]).length;
    const badges=`${greenN>0?`<span class="cnt-dot green">${greenN}</span>`:''}${redN>0?`<span class="cnt-dot red">${redN}</span>`:''}`;
    const grid=keys.map(k=>{const t=TYPES[k];
      let dlTag='';
      if(hasDeadline(k)){
        const pk=periodOf(k,todayStr);const dt=deadlineOf(k,pk);
        if(siteDone[k])dlTag=`<span class="gi-done"><i class="ti ti-circle-check"></i> 제출완료${siteDoneAt[k]?' '+fmtWhen(siteDoneAt[k]):''}</span>`;
        else if(dt)dlTag=`<span class="gi-dl">미제출 ~${md(dt)}(${WEEKDAY[dt.getDay()]})</span>`;
      }
      return t.ready
        ? `<button class="grid-item" onclick="openType('${k}')"><span class="gi-icon"><i class="ti ${KIND_ICON[t.kind]}"></i></span><span class="gi-label">${t.label}</span>${dlTag}<i class="ti ti-chevron-right gi-arrow"></i></button>`
        : `<div class="grid-item soon"><span class="gi-icon"><i class="ti ${KIND_ICON[t.kind]}"></i></span><span class="gi-label">${t.label}</span><span class="gi-soon">준비중</span></div>`;
    }).join('');
    return `<div class="acc${open?' open':''}" id="acc-${g}">
      <button class="acc-head" onclick="toggleGroup('${g}')">
        <span class="acc-icon"><i class="ti ${GROUP_ICON[g]}"></i></span>
        <span class="acc-tw"><span class="acc-name">${GROUP_LABEL[g]||g}</span><span class="acc-count">${readyN}개 항목</span></span>
        ${badges}
        <i class="ti ti-chevron-down acc-chev"></i>
      </button>
      <div class="acc-body"><div class="item-grid">${grid}</div></div>
    </div>`;
  }).join('');
}
function renderNav(){
  const nav=$('nav-area');
  if(navView==='site'){
    const mgr=selectedMgr();
    if(!mgr){nav.innerHTML='<div class="empty">먼저 이름을 선택하세요</div>';return;}
    const sites=mgr.sites||[];
    if(!sites.length){nav.innerHTML='<div class="empty">담당 사업장이 없습니다. 관리자에게 문의하세요.</div>';return;}
    nav.innerHTML=`<div class="pick-title">사업장을 선택하세요</div><div class="site-grid">`+
      sites.map(s=>`<button class="site-pick" onclick="pickSite('${s.replace(/'/g,"\\'")}')"><span class="sp-icon"><i class="ti ti-building-factory-2"></i></span><span class="sp-name">${s}</span></button>`).join('')+`</div>`;
    return;
  }
  nav.innerHTML=`<div class="brand-bar">
      <div class="bb-main"><span class="bb-co">온정 F&amp;B</span><i class="ti ti-chevron-right bb-sep"></i><span class="bb-site">${selSite}</span><i class="ti ti-chevron-right bb-sep"></i><span class="bb-mgr">${cMgr()}</span></div>
      <button class="site-change" onclick="changeSite()">사업장 변경</button>
    </div>`+accordionHtml();
}
window.pickSite=async function(s){
  selSite=s;$('site-select').value=s;expandedGroup=null;
  showLoading('불러오는 중...');await loadSiteDone(s);hideLoading();
  go({screen:'submit',view:'browse'});
};
async function loadSiteDone(site){
  siteDone={};siteDoneAt={};
  if(!site)return;
  const month=todayStr.slice(0,7);
  const periods=new Set([month]);
  Object.keys(TYPES).forEach(k=>{const t=TYPES[k];if(t.ready&&t.kind!=='approval')periods.add(periodOf(k,todayStr));});
  const recs=[];
  try{
    for(const p of periods){
      const snap=await getDocs(query(collection(db,'records'),where('site','==',site),where('period','==',p)));
      snap.forEach(d=>recs.push(d.data()));
    }
  }catch(e){console.error('현황 로드 실패',e);}
  function latest(list){const ts=list.map(r=>r.submittedAt).filter(Boolean).sort();return ts.length?ts[ts.length-1]:'';}
  Object.keys(TYPES).forEach(k=>{
    const t=TYPES[k];if(!t.ready)return;
    if(t.kind==='approval'){
      const list=recs.filter(r=>r.type===k&&r.kind==='approval');
      siteDone[k]=list.length>0;if(siteDone[k])siteDoneAt[k]=latest(list);
      return;
    }
    const period=periodOf(k,todayStr);
    const slots=expectedSlots(k,site,todayStr);
    if(!slots.length){siteDone[k]=true;return;}
    const list=recs.filter(r=>r.type===k&&r.period===period);
    siteDone[k]=slots.every(s=>list.some(r=>r.slot===s));
    if(siteDone[k])siteDoneAt[k]=latest(list);
  });
}
window.changeSite=function(){history.back();};
window.toggleGroup=function(g){
  expandedGroup=expandedGroup===g?null:g;renderNav();
  if(expandedGroup)setTimeout(()=>{const el=$('acc-'+g);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},80);
};
window.openType=function(k){curType=k;go({screen:'submit',view:'form'});};
function renderForm(){
  const t=TYPES[curType];
  initPeriodSel();
  $('form-header').innerHTML=`<div class="form-hero"><span class="fh-icon"><i class="ti ${KIND_ICON[t.kind]}"></i></span><div><div class="fh-title">${t.label}</div><div class="fh-sub">${GROUP_LABEL[t.group]||t.group}${t.viewAll?' · 사업장별 제출 + 전체 열람':''}</div></div></div>`;
  $('period-area').innerHTML=renderPeriodPicker();
  $('form-tabs').style.display=(t.kind==='approval')?'none':'flex';

let formTab='submit';
window.showFormTab=function(tab){
  formTab=tab;
  $('ftab-submit').classList.toggle('active',tab==='submit');
  $('ftab-history').classList.toggle('active',tab==='history');
  $('submit-pane').style.display=tab==='submit'?'block':'none';
  $('history-area').style.display=tab==='history'?'block':'none';
};
function initPeriodSel(){
  const t=TYPES[curType];const now=new Date(todayStr+'T12:00:00');
  if(t.period==='weekly'){const ws=periodOf(curType,todayStr);periodSel={...ymwFromWeekStart(ws),weekStart:ws};}
  else if(t.period==='monthly'){let y=now.getFullYear(),m=now.getMonth()+1;if(t.prevMonth){m--;if(m<1){m=12;y--;}}periodSel={year:y,month:m,week:0,weekStart:''};}
  else if(t.period==='yearly'){periodSel={year:now.getFullYear(),month:0,week:0,weekStart:''};}
  else periodSel={year:0,month:0,week:0,weekStart:'',date:todayStr};
}
function curPeriod(){
  const t=TYPES[curType];
  if(t.period==='weekly')return periodSel.weekStart;
  if(t.period==='monthly')return `${periodSel.year}-${String(periodSel.month).padStart(2,'0')}`;
  if(t.period==='yearly')return String(periodSel.year);
  return cDate();
}
function stepMain(typeKey,period){
  const t=TYPES[typeKey];
  if(t.period==='daily'){const d=new Date(period+'T12:00:00');return `${d.getFullYear()}. ${p2(d.getMonth()+1)}. ${p2(d.getDate())} (${WEEKDAY[d.getDay()]})`;}
  if(t.period==='weekly'){const w=ymwFromWeekStart(period);return `${w.month}월 ${w.week}주차`;}
  if(t.period==='monthly'){const a=period.split('-');return `${a[0]}년 ${Number(a[1])}월`;}
  if(t.period==='yearly')return `${period}년`;
  return period;
}
function stepSub(typeKey,period){
  const t=TYPES[typeKey];
  if(t.period==='weekly'){const m=new Date(period+'T12:00:00'),s=new Date(m);s.setDate(m.getDate()+6);return `(${md(m)}~${md(s)})`;}
  return '';
}
function stepShort(typeKey){const t=TYPES[typeKey];return t.period==='weekly'?'이번 주':t.period==='monthly'?'이번 달':t.period==='yearly'?'올해':'오늘';}
function stepperHtml(typeKey,period,prevExpr,nextExpr,nowExpr,nowLabel){
  const main=stepMain(typeKey,period),sub=stepSub(typeKey,period);
  const isCur=(period===periodOf(typeKey,todayStr));
  const nowChip=isCur?'':`<button class="step-now-chip" onclick="${nowExpr}"><i class="ti ti-rotate-clockwise-2"></i> ${nowLabel||stepShort(typeKey)}</button>`;
  return `<div class="step-wrap"><div class="step-row">
    <button class="step-btn" onclick="${prevExpr}"><i class="ti ti-chevron-left"></i></button>
    <div class="step-mid"><span class="step-lbl">${main}</span>${sub?`<span class="step-sub">${sub}</span>`:''}</div>
    ${nowChip}
    <button class="step-btn" onclick="${nextExpr}"><i class="ti ti-chevron-right"></i></button>
  </div></div>`;
}
function renderPeriodPicker(){
  const t=TYPES[curType];
  if(t.kind==='approval')return '';
  return stepperHtml(curType,curPeriod(),'periodStep(-1)','periodStep(1)','goCurrentPeriod()');
}
window.periodStep=function(dir){
  const t=TYPES[curType];
  if(t.period==='daily'){const d=new Date(cDate()+'T12:00:00');d.setDate(d.getDate()+dir);periodSel.date=ymd(d);}
  else if(t.period==='weekly'){const m=new Date(periodSel.weekStart+'T12:00:00');m.setDate(m.getDate()+7*dir);periodSel={...ymwFromWeekStart(ymd(m)),weekStart:ymd(m)};}
  else if(t.period==='monthly'){let y=periodSel.year,mo=periodSel.month+dir;if(mo<1){mo=12;y--;}if(mo>12){mo=1;y++;}periodSel.year=y;periodSel.month=mo;}
  else if(t.period==='yearly'){periodSel.year+=dir;}
  $('period-area').innerHTML=renderPeriodPicker();onContextChange();
};
window.goCurrentPeriod=function(){initPeriodSel();$('period-area').innerHTML=renderPeriodPicker();onContextChange();};

// ── 매니저/사업장 ──
window.onManagerChange=function(){
  const mgr=selectedMgr(),name=mgr?mgr.name:'',siteSel=$('site-select'),hint=$('site-hint');
  if(mgr)localStorage.setItem('savedManager',mgrKey(mgr));
  selSite=null;expandedGroup=null;siteSel.innerHTML='';
  $('form-area').style.display='none';$('nav-area').style.display='block';navView='site';
  if(!mgr){hint.textContent='';renderNav();return;}
  (mgr.sites||[]).forEach(s=>siteSel.appendChild(new Option(s,s)));
  hint.textContent=`담당 사업장 ${(mgr.sites||[]).length}곳`;
  renderNav();
};
window.onContextChange=onContextChange;
async function onContextChange(){
  slotState={};
  const t=TYPES[curType],site=cSite(),date=cDate();
  if(t.kind==='approval'){if(cMgr()&&site)await loadMyApprovals();renderSubmitBody();return;}
  if(!site){renderSubmitBody();return;}
  showLoading('불러오는 중...');
  await loadSlotRecords();
  hideLoading();
  renderSubmitBody();
}
async function loadSlotRecords(){
  const period=curPeriod();
  const snap=await getDocs(query(collection(db,'records'),where('type','==',curType),where('site','==',cSite())));
  itemHistory=[];
  snap.forEach(d=>{const r=d.data();r.id=d.id;itemHistory.push(r);if(r.period===period){slotState[r.slot]=slotState[r.slot]||{};slotState[r.slot].record=r;}});
  itemHistory.sort((a,b)=>(b.period||'').localeCompare(a.period||'')||(b.submittedAt||'').localeCompare(a.submittedAt||''));
}

// ── 제출 화면 ──
function renderSubmitBody(){
  const t=TYPES[curType],body=$('submit-body'),wrap=$('submit-wrap'),dlInline=$('dl-inline'),hist=$('history-area');
  dlInline.innerHTML='';wrap.style.display='none';hist.innerHTML='';const ex=$('extra-area');if(ex)ex.innerHTML='';
  if(t.kind==='approval'){renderApprovalSubmit();return;}
  const site=cSite();
  if(!site){body.innerHTML='<div class="empty">사업장을 선택하세요</div>';return;}
  const slots=expectedSlots(curType,site,cDate());
  if(!slots.length){body.innerHTML='<div class="empty">이 기간에 제출 대상이 없습니다</div>';hist.innerHTML=renderHistory();return;}
  renderDeadlineBanner(slots);
  body.innerHTML=slots.map(s=>buildSlot(s)).join('');
  wrap.style.display='block';
  hist.innerHTML=renderHistory();
  updateSubmitBtn();
  const extra=$('extra-area');if(extra){if(t.viewAll){renderAllMenus();}else{extra.innerHTML='';}}
}
function menuViewKey(){
  if(!menuViewPeriod)menuViewPeriod=periodOf('menu',todayStr);
  return menuViewPeriod;
}
window.mvStep=function(dir){const m=new Date(menuViewKey()+'T12:00:00');m.setDate(m.getDate()+7*dir);menuViewPeriod=ymd(m);renderAllMenus();};
window.mvNow=function(){menuViewPeriod=periodOf('menu',todayStr);renderAllMenus();};
window.mvSearch=function(v){menuViewSearch=v;renderMenuList();};
let menuViewCache=[];
function renderMenuList(){
  const box=$('mv-list');if(!box)return;
  const q=(menuViewSearch||'').trim().toLowerCase();
  let list=menuViewCache.slice();
  if(q)list=list.filter(r=>(r.site||'').toLowerCase().includes(q)||(r.manager||'').toLowerCase().includes(q));
  box.innerHTML=list.length?list.map(r=>`<div class="rec-row"><span class="rec-site">${r.site}</span><span class="rec-mgr">${r.manager||''}</span>${attLink(r)}</div>`).join(''):`<div class="rec-empty">${q?'검색 결과가 없습니다':'아직 올라온 식단표가 없습니다'}</div>`;
}
async function renderAllMenus(){
  const el=$('extra-area');if(!el)return;
  const period=menuViewKey();
  const head=`<div class="panel-head"><span class="panel-title"><i class="ti ti-tools-kitchen-2"></i> 전체 사업장 식단표</span></div>`;
  const step=`<div class="ip-box mv">${stepperHtml('menu',period,'mvStep(-1)','mvStep(1)','mvNow()')}</div>`;
  const search=`<div class="search-row"><i class="ti ti-search"></i><input type="text" id="mv-search" placeholder="사업장 · 영양사 검색" value="${esc(menuViewSearch||'')}" oninput="mvSearch(this.value)"/><button class="search-x" onclick="$('mv-search').value='';mvSearch('')"><i class="ti ti-x"></i></button></div>`;
  el.innerHTML=`<div class="panel">${head}${step}${search}<div id="mv-list"><div class="rec-empty">불러오는 중...</div></div></div>`;
  try{
    const snap=await getDocs(query(collection(db,'records'),where('type','==','menu'),where('period','==',period)));
    if(menuViewKey()!==period)return;
    menuViewCache=[];snap.forEach(d=>{const r=d.data();r.id=d.id;if(r.fileURL)menuViewCache.push(r);});
    menuViewCache.sort((a,b)=>(a.site||'').localeCompare(b.site||'','ko'));
    renderMenuList();
  }catch(e){const box=$('mv-list');if(box)box.innerHTML='<div class="rec-empty">불러오기 실패</div>';}
}
function renderHistory(){
  const t=TYPES[curType],cp=curPeriod();
  const all=itemHistory.slice();
  if(!all.length)return '<div class="panel"><div class="panel-head"><span class="panel-title"><i class="ti ti-history"></i> 제출 이력</span></div><div class="empty" style="padding:20px;">제출 내역이 없습니다</div></div>';
  const byP={};all.forEach(r=>{(byP[r.period]=byP[r.period]||[]).push(r);});
  const periods=Object.keys(byP).sort((a,b)=>b.localeCompare(a));
  const icon=t.kind==='photo'?'ti-photo':t.kind==='form'?'ti-clipboard-text':'ti-file-text';
  const rows=periods.map(p=>{
    const items=byP[p].sort((a,b)=>(a.slot||'').localeCompare(b.slot||'')).map(r=>{
      const slot=(r.slot&&r.slot!=='기본')?`<span class="hl-slot">${r.slot}</span>`:'';
      const canDl=(t.kind==='file'||t.kind==='photo')&&(r.fileURL||r.photoURLs);
      let nameEl;
      if(t.kind==='form'&&r.form)nameEl=`<span class="hi-name">${t.fields.map(f=>`${f.label}: ${r.form[f.key]??'-'}`).join(', ')}</span>`;
      else{const val=r.fileName||(r.photoURLs?'사진':'첨부');if(canDl){attLookup[r.id]=r;nameEl=`<button class="hi-name hi-dl" onclick="dlAtt('${r.id}')">${val}</button>`;}else nameEl=`<span class="hi-name">${val}</span>`;}
      const status=r.viewed?'<span class="st-pill ok">확인됨</span>':(r.wasEdited?'<span class="st-pill edit">수정됨</span>':'<span class="st-pill wait">검토 대기</span>');
      const acc=(t.kind==='photo')?' accept="image/*"':(isExcelOnly(curType)?' accept=".xlsx,.xls,.xlsm,.xlsb,.csv"':'');
      const editBtn=(t.kind==='form')?'':`<label class="hist-btn"><i class="ti ti-edit"></i> 수정<input type="file"${acc} hidden onchange="onHistoryEdit(this,'${r.id}')"/></label>`;
      const delBtn=`<button class="hist-btn del" onclick="delHistoryRec('${r.id}')"><i class="ti ti-trash"></i> 삭제</button>`;
      return `<div class="hi-card">
        <div class="hi-row1"><i class="ti ${icon} hi-ic"></i>${nameEl}${slot}${status}</div>
        <div class="hi-row2"><span class="hi-when"><i class="ti ti-clock"></i> ${fmtWhen(r.submittedAt)} 제출</span><div class="hi-acts">${editBtn}${delBtn}</div></div>
      </div>`;
    }).join('');
    const nowTag=(p===cp)?'<span class="hp-now">이번 회차</span>':'';
    return `<div class="hist-grp"><div class="hist-grp-head">${periodLabel(curType,p)}${nowTag}</div>${items}</div>`;
  }).join('');
  return `<div class="panel"><div class="panel-head"><span class="panel-title"><i class="ti ti-history"></i> 제출 이력</span></div>${rows}</div>`;
}
async function uploadReplace(r,file){
  const t=TYPES[r.type];
  if(isExcelOnly(r.type)){const ext=(file.name.split('.').pop()||'').toLowerCase();if(!EXCEL_EXT.includes(ext)){toast('결산 항목은 엑셀 파일(.xlsx)만 올릴 수 있습니다',true);return;}}
  showLoading('수정 업로드 중...');
  try{
    const docId=`${r.type}__${sani(r.site)}__${r.period}__${sani(r.slot)}`;
    const base={type:r.type,kind:t.kind,manager:cMgr()||r.manager,site:r.site,period:r.period,slot:r.slot,submittedAt:new Date().toISOString(),status:'submitted',viewed:false};
    if(r.viewed)base.wasEdited=true;
    if(t.kind==='photo'){const blob=await compressImage(file);const sref=ref(storage,`records/${r.type}/${r.period}/${sani(r.site)}/${sani(r.slot)}/${Date.now()}.jpg`);await withTimeout(uploadBytes(sref,blob),30000,'업로드');const url=await withTimeout(getDownloadURL(sref),10000,'URL');await setDoc(doc(db,'records',docId),{...base,photoURLs:[url]});}
    else{const ext=(file.name.split('.').pop()||'dat').toLowerCase();const sref=ref(storage,`records/${r.type}/${r.period}/${sani(r.site)}/${sani(r.slot)}/${Date.now()}.${ext}`);await withTimeout(uploadBytes(sref,file),60000,'업로드');const url=await withTimeout(getDownloadURL(sref),10000,'URL');await setDoc(doc(db,'records',docId),{...base,fileURL:url,fileName:file.name});}
    hideLoading();await onContextChange();await loadSiteDone(selSite||cSite());updateHomeBadge();toast('수정했습니다');
  }catch(e){hideLoading();toast('수정 실패: '+e.message,true);}
}
window.onHistoryEdit=function(input,id){const r=itemHistory.find(x=>x.id===id);if(!r)return;const f=input.files[0];if(!f)return;uploadReplace(r,f);};
window.delHistoryRec=async function(id){
  const r=itemHistory.find(x=>x.id===id);if(!r)return;
  if(!confirm('이 제출을 삭제할까요? 되돌릴 수 없습니다.'))return;
  showLoading('삭제 중...');
  try{
    const docId=`${r.type}__${sani(r.site)}__${r.period}__${sani(r.slot)}`;
    await deleteDoc(doc(db,'records',docId));
    hideLoading();await onContextChange();await loadSiteDone(selSite||cSite());updateHomeBadge();toast('삭제했습니다');
  }catch(e){hideLoading();toast('삭제 실패: '+e.message,true);}
};
function renderDeadlineBanner(slots){
  const dl=deadlineOf(curType,curPeriod());
  const done=slots.filter(s=>slotState[s]&&slotState[s].record).length;
  let pill,cls;
  if(done===slots.length){cls='dl-done';pill='제출완료';}
  else if(dl&&Date.now()>dl.getTime()){cls='dl-late';pill='마감 지남';}
  else if(dl&&dl.getTime()-Date.now()<6*36e5){cls='dl-soon';pill='마감 임박';}
  else{cls='dl-open';pill=done>0?`진행 ${done}/${slots.length}`:'미제출';}
  const dlText=dl?fmtDeadlineOf(curType,curPeriod()):'마감 미설정';
  $('dl-inline').innerHTML=`<span class="dl-pill ${cls}">${pill}</span><span class="dl-txt">${dlText}</span>`;
}
function buildSlot(slot){
  const t=TYPES[curType],st=slotState[slot]||{},rec=st.record;
  let inner='';
  if(t.kind==='photo')inner=`<label class="btn-upload${st.preview?' has':''}"><i class="ti ti-camera"></i><span>${st.preview?'사진 변경':'사진을 첨부하세요'}</span><input type="file" accept="image/*" onchange="onPick('${slot}',this)"/></label>${st.preview?`<img class="thumb" src="${st.preview}"/>`:''}`;
  else if(t.kind==='file'){const ex=isExcelOnly(curType);inner=`<label class="btn-upload${st.file?' has':''}"><i class="ti ti-file-upload"></i><span>${st.file?st.file.name:(ex?'엑셀 파일을 첨부하세요 (.xlsx)':'파일을 첨부하세요 (엑셀·PDF·사진 등)')}</span><input type="file"${ex?' accept=".xlsx,.xls,.xlsm,.xlsb,.csv"':''} onchange="onPick('${slot}',this)"/></label>`;}
  else if(t.kind==='form')inner=`<div class="form-fields">${t.fields.map(f=>`<input type="${f.type==='number'?'number':'text'}" placeholder="${f.label}" value="${st.form&&st.form[f.key]!=null?st.form[f.key]:''}" oninput="onForm('${slot}','${f.key}',this.value)"/>`).join('')}</div>`;
  const single=(slot==='기본');

  return `<div class="slot-row${single?' single':''}">${head}${inner}</div>`;

const EXCEL_EXT=['xlsx','xls','xlsm','xlsb','csv'];
function isExcelOnly(typeKey){return TYPES[typeKey].group==='결산관리';}
window.onPick=function(slot,input){

window.onForm=function(slot,key,val){slotState[slot]=slotState[slot]||{};slotState[slot].form=slotState[slot].form||{};slotState[slot].form[key]=val;updateSubmitBtn();};
function updateSubmitBtn(){

function compressImage(file){return new Promise(res=>{
  const url=URL.createObjectURL(file),img=new Image();
  const cl=()=>URL.revokeObjectURL(url);const tm=setTimeout(()=>{cl();res(file);},15000);
  img.onload=()=>{clearTimeout(tm);try{cl();const c=document.createElement('canvas');let w=img.width,h=img.height,mw=1200,q=.8;
    if(w>4000||h>4000){mw=800;q=.7;}else if(w>3000||h>3000){mw=900;q=.72;}else if(w>2000||h>2000){mw=1000;q=.76;}
    if(w>h){if(w>mw){h=Math.round(h*mw/w);w=mw;}}else{if(h>mw){w=Math.round(w*mw/h);h=mw;}}
    c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
    c.toBlob(b=>res(b||file),'image/jpeg',q);}catch(e){res(file);}};
  img.onerror=()=>{clearTimeout(tm);cl();res(file);};img.src=url;});}
function withTimeout(p,ms,l){return Promise.race([p,new Promise((_,rj)=>setTimeout(()=>rj(new Error((l||'작업')+' 시간 초과')),ms))]);}

window.submitSlots=async function(){
  const t=TYPES[curType],manager=cMgr(),date=cDate(),period=curPeriod();
  const site=cSite();
  if(!manager){toast('매니저를 선택하세요',true);return;}
  const slots=expectedSlots(curType,site,date);
  const targets=slots.filter(s=>{const st=slotState[s];
    if(t.kind==='form')return st&&st.form&&t.fields.some(f=>st.form[f.key]!=null&&st.form[f.key]!=='');
    return st&&st.file;});
  if(!targets.length){toast('제출할 내용이 없습니다',true);return;}
  $('btn-submit').disabled=true;
  let done=0;
  for(const slot of targets){
    $('btn-submit').textContent=`${slot} 제출 중... (${done+1}/${targets.length})`;
    try{
      const st=slotState[slot];
      const base={type:curType,kind:t.kind,manager,site,period,slot,submittedAt:new Date().toISOString(),status:'submitted',viewed:false};
      if(st.prevViewed)base.wasEdited=true;
      const docId=`${curType}__${sani(site)}__${period}__${sani(slot)}`;
      if(t.kind==='photo'){
        const blob=await compressImage(st.file);
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.jpg`);
        await withTimeout(uploadBytes(sref,blob),30000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,photoURLs:[url]});
      }else if(t.kind==='file'){
        const ext=(st.file.name.split('.').pop()||'dat').toLowerCase();
        const sref=ref(storage,`records/${curType}/${period}/${sani(site)}/${sani(slot)}/${Date.now()}.${ext}`);
        await withTimeout(uploadBytes(sref,st.file),60000,'업로드');
        const url=await withTimeout(getDownloadURL(sref),10000,'URL');
        await setDoc(doc(db,'records',docId),{...base,fileURL:url,fileName:st.file.name});
      }else if(t.kind==='form'){
        await setDoc(doc(db,'records',docId),{...base,form:st.form});
      }
      slotState[slot]={record:{...base}};done++;
    }catch(e){toast(`${slot} 실패 — ${e.message&&e.message.includes('시간 초과')?'네트워크 불안정, 다시 시도':'다시 시도해 주세요'}`,true);console.error(e);}
  }
  renderSubmitBody();
  if(done>0)await loadSiteDone(selSite||cSite());
  toast(`제출 완료! (${done}건)`);
};

function initAdminPeriod(k){
  const t=TYPES[k];
  if(t.period==='weekly'){const ws=periodOf(k,todayStr);adminItemPeriod[k]={...ymwFromWeekStart(ws),weekStart:ws};}
  else if(t.period==='monthly'){const ym=periodOf(k,todayStr);const [y,m]=ym.split('-');adminItemPeriod[k]={year:+y,month:+m};}
  else if(t.period==='yearly'){adminItemPeriod[k]={year:+periodOf(k,todayStr)};}
  else adminItemPeriod[k]={date:todayStr};
}
function adminPeriodKey(k){
  const t=TYPES[k],s=adminItemPeriod[k];
  if(t.period==='weekly')return s.weekStart;
  if(t.period==='monthly')return `${s.year}-${String(s.month).padStart(2,'0')}`;
  if(t.period==='yearly')return String(s.year);
  return s.date;
}
function adminStepper(k){
  return stepperHtml(k,adminPeriodKey(k),`adminStep('${k}',-1)`,`adminStep('${k}',1)`,`adminNow('${k}')`);
}
window.adminStep=function(k,dir){
  const t=TYPES[k],s=adminItemPeriod[k];
  if(t.period==='daily'){const d=new Date(s.date+'T12:00:00');d.setDate(d.getDate()+dir);s.date=ymd(d);}
  else if(t.period==='weekly'){const m=new Date(s.weekStart+'T12:00:00');m.setDate(m.getDate()+7*dir);adminItemPeriod[k]={...ymwFromWeekStart(ymd(m)),weekStart:ymd(m)};}
  else if(t.period==='monthly'){let y=s.year,mo=s.month+dir;if(mo<1){mo=12;y--;}if(mo>12){mo=1;y++;}s.year=y;s.month=mo;}
  else if(t.period==='yearly'){s.year+=dir;}
  reloadItem(k);
};
window.adminNow=function(k){initAdminPeriod(k);reloadItem(k);};
async function fetchAdminPeriod(k,period){
  try{
    const snap=await getDocs(query(collection(db,'records'),where('type','==',k),where('period','==',period)));
    adminRecords=adminRecords.filter(r=>!(r.type===k&&r.period===period));
    snap.forEach(d=>{const r=d.data();r.id=d.id;adminRecords.push(r);});
  }catch(e){console.error('조회 실패',e);}
}
async function reloadItem(k){
  showLoading('불러오는 중...');await fetchAdminPeriod(k,adminPeriodKey(k));hideLoading();
  const wrap=$('iw-'+sani(k));if(wrap){wrap.innerHTML=renderStatusItem(k);const body=$('ir-'+sani(k));if(body){body.classList.add('open');const chev=body.previousElementSibling.querySelector('.ir-chev');if(chev)chev.style.transform='rotate(180deg)';}}
}
async function loadStatus(){

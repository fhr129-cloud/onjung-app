function stdName(r){
  const t=TYPES[r.type];let p='';
  if(t.period==='weekly'){const w=ymwFromWeekStart(r.period);p=`${w.year}년${w.month}월${w.week}주차`;}
  else if(t.period==='monthly'){const a=r.period.split('-');p=`${a[0]}년${Number(a[1])}월`;}
  else if(t.period==='yearly'){p=`${r.period}년`;}
  else p=r.period;
  const ext=(r.fileName&&r.fileName.includes('.'))?'.'+r.fileName.split('.').pop():'';
  return `${p} ${t.label}(${r.site})${ext}`.replace(/[\\/:*?"<>|]/g,'_');
}
function zipName(typeKey,period){
  const t=TYPES[typeKey];let pp='';
  if(t.period==='weekly'){const w=ymwFromWeekStart(period);pp=`${w.year}년${w.month}월${w.week}주차`;}
  else if(t.period==='monthly'){const a=period.split('-');pp=`${a[0]}년${Number(a[1])}월`;}
  else if(t.period==='yearly'){pp=`${period}년`;}
  else {const a=period.split('-');pp=`${Number(a[1])}월${Number(a[2])}일`;}
  const base=(t.group==='결산관리')?`${pp} FS ${t.label}`:`${pp} ${t.label}`;
  return base.replace(/[\\/:*?"<>|]/g,'_')+'.zip';
}
window.downloadAll=async function(typeKey,period){
  const recs=adminRecords.filter(r=>r.type===typeKey&&r.period===period&&r.fileURL);
  if(!recs.length){toast('받을 파일이 없습니다',true);return;}
  if(typeof JSZip==='undefined'){toast('다운로드 모듈 로딩 실패 — 새로고침 후 다시',true);return;}
  showLoading(`파일 모으는 중... (0/${recs.length})`);
  try{
    const zip=new JSZip();let i=0;
    for(const r of recs){
      i++;$('loading-text').textContent=`파일 모으는 중... (${i}/${recs.length})`;
      const blob=await fetch(r.fileURL).then(x=>{if(!x.ok)throw new Error('파일 받기 실패');return x.blob();});
      let nm=stdName(r);if(zip.file(nm))nm=nm.replace(/(\.[^.]+)?$/,'_'+i+'$1');
      zip.file(nm,blob);
      if(r.viewed===false)markViewed(r.id);
    }
    const out=await zip.generateAsync({type:'blob'});
    const a=document.createElement('a');a.href=URL.createObjectURL(out);
    a.download=zipName(typeKey,period);
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    hideLoading();toast(`${recs.length}개 파일을 받았습니다`);
  }catch(e){hideLoading();toast('다운로드 실패: '+e.message,true);console.error(e);}
};
function apprItemCard(r){
  const isNew=r.viewed===false;
  const fname=r.fileName||(r.form&&r.form.title)||'첨부';
  let fileEl;
  if(r.fileURL||r.photoURLs){attLookup[r.id]=r;fileEl=`<button class="file-link" onclick="dlAtt('${r.id}')"><i class="ti ti-paperclip"></i> ${fname}</button>`;}
  else fileEl=`<div class="appr-reason">${fname}</div>`;
  return `<div class="appr-card">
    <div class="appr-meta">${r.site} · ${r.manager} · ${fmtWhen(r.submittedAt)}${isNew?' <span class="new-tag">NEW</span>':''}</div>
    ${fileEl}</div>`;
}
async function renderApprovalQueue(){
  const snap=await getDocs(query(collection(db,'records'),where('kind','==','approval')));
  const all=[];snap.forEach(d=>all.push({id:d.id,...d.data()}));
  const unviewed=all.filter(r=>r.viewed===false);
  const tb=$('tab-badge-approval');if(tb){tb.textContent=unviewed.length||'';tb.style.display=unviewed.length?'inline-flex':'none';}
  const types=Object.keys(TYPES).filter(k=>TYPES[k].group==='결재요청');
  if(apprCat!=='all'&&!types.includes(apprCat))apprCat='all';
  const chips=`<div class="cat-chips appr-chips"><button class="cat-chip${apprCat==='all'?' active':''}" onclick="setApprCat('all')">전체${unviewed.length?` <span class="chip-n">${unviewed.length}</span>`:''}</button>`+
    types.map(k=>{const nc=all.filter(r=>r.type===k&&r.viewed===false).length;return `<button class="cat-chip${apprCat===k?' active':''}" onclick="setApprCat('${k}')">${TYPES[k].label}${nc?` <span class="chip-n">${nc}</span>`:''}</button>`;}).join('')+`</div>`;
  const showTypes=apprCat==='all'?types:[apprCat];
  let body='';
  showTypes.forEach(k=>{
    const recs=all.filter(r=>r.type===k).sort((a,b)=>(b.submittedAt||'').localeCompare(a.submittedAt||''));
    body+=`<div class="appr-group"><div class="appr-group-head"><i class="ti ti-file-text"></i> ${TYPES[k].label} <span class="ag-n">${recs.length?recs.length+'건':'없음'}</span></div>`;
    body+=recs.length?recs.map(apprItemCard).join(''):`<div class="empty" style="padding:14px;font-size:12.5px;">제출된 문서가 없습니다</div>`;
    body+=`</div>`;
  });
  $('approval-wrap').innerHTML=chips+body;
}
window.setApprCat=function(c){apprCat=c;renderApprovalQueue();};
window.markViewed=async function(id){
  try{
    await updateDoc(doc(db,'records',id),{viewed:true,viewedAt:new Date().toISOString()});
    const rec=adminRecords.find(r=>r.id===id);if(rec)rec.viewed=true;
    updateHomeBadge();
  }catch(e){console.error('열람 표시 실패',e);}
};

// ── 설정 ──
function renderDeadlineSettings(){
  let html='';
  GROUP_ORDER.forEach(g=>{
    const keys=Object.keys(TYPES).filter(k=>TYPES[k].group===g&&TYPES[k].kind!=='approval'&&!TYPES[k].noDeadline&&TYPES[k].ready);
    if(!keys.length)return;
    const setN=keys.filter(k=>{const d=DEADLINES[k];return d&&(d.date||d.dow!=null);}).length;
    const id='dlc-'+sani(g);
    const items=keys.map(k=>{
      const t=TYPES[k],r=DEADLINES[k]||{};
      if(t.period==='weekly'){
        const defD=(t.weekKind==='next'?0:3);
        const cur=(r.dow!=null)?r.dow:defD;
        const sel=`<select onchange="setDlDow('${k}',this.value)">${[1,2,3,4,5,6,0].map(d=>`<option value="${d}"${d===cur?' selected':''}>${WEEKDAY[d]}요일</option>`).join('')}</select>`;
        return `<div class="dl-item">
          <div class="dl-item-name">${t.label} <span class="dl-grp">${t.weekKind==='next'?'매주 · 다음주분':'매주 · 전주분'}</span></div>
          <div class="dl-item-ctl">${sel}${r.dow!=null?`<button class="dl-clear" onclick="clearDl('${k}')" title="기본값으로"><i class="ti ti-rotate-2"></i></button>`:''}</div>
        </div>`;
      }
      return `<div class="dl-item">
        <div class="dl-item-name">${t.label}</div>
        <div class="dl-item-ctl">
          <input type="date" value="${r.date||''}" onchange="setDl('${k}','date',this.value)" onclick="this.showPicker&&this.showPicker()"/>
          ${r.date?`<button class="dl-clear" onclick="clearDl('${k}')"><i class="ti ti-x"></i></button>`:''}
        </div>
      </div>`;
    }).join('');
    const isOpen=openDlCats.has(id);
    html+=`<div class="dl-cat">
      <button class="dl-cat-head" onclick="toggleDlCat('${id}')">
        <i class="ti ${GROUP_ICON[g]}"></i><span class="dlc-name">${GROUP_LABEL[g]||g}</span>
        ${setN?`<span class="dlc-cnt">${setN}</span>`:''}
        <i class="ti ti-chevron-down dlc-chev"${isOpen?' style="transform:rotate(180deg)"':''}></i>
      </button>
      <div class="dl-cat-body${isOpen?' open':''}" id="${id}">${items}</div>
    </div>`;
  });
  $('deadline-settings').innerHTML=html+`<button class="btn-primary" style="width:100%;margin-top:14px;" onclick="saveDl()"><i class="ti ti-device-floppy"></i> 마감기한 저장 · 공지</button>`;
}
window.setDl=function(k,field,val){DEADLINES[k]=DEADLINES[k]||{};DEADLINES[k][field]=val;renderDeadlineSettings();};
window.setDlDow=function(k,val){DEADLINES[k]=DEADLINES[k]||{};DEADLINES[k].dow=+val;renderDeadlineSettings();};
window.clearDl=function(k){delete DEADLINES[k];renderDeadlineSettings();};
function noticeText(){
  const lines=[];
  Object.keys(TYPES).forEach(k=>{const t=TYPES[k];if(!t.ready||t.kind==='approval')return;
    if(t.period==='weekly'){const defD=(t.weekKind==='next'?0:3);const D=(DEADLINES[k]&&DEADLINES[k].dow!=null)?DEADLINES[k].dow:defD;lines.push(`· ${t.label}: 매주 ${WEEKDAY[D]}요일`);}
    else if(DEADLINES[k]&&DEADLINES[k].date){const p=DEADLINES[k].date.split('-');lines.push(`· ${t.label}: ${Number(p[1])}/${Number(p[2])}`);}
  });
  return '마감기한이 업데이트되었습니다.\n\n'+lines.join('\n');
}
window.saveDl=async function(){
  showLoading('저장 중...');
  try{
    await saveDeadlines();
    const id=Date.now().toString(36);
    await setDoc(doc(db,'config','notice'),{id,text:noticeText(),at:new Date().toISOString()});
    localStorage.setItem('noticeRead',id);
    hideLoading();toast('마감기한 저장 · 매니저에게 공지됩니다');
  }catch(e){hideLoading();toast('저장 실패: '+e.message,true);}
};
const openDlCats=new Set();
window.toggleDlCat=function(id){const el=$(id);if(!el)return;const open=el.classList.toggle('open');if(open)openDlCats.add(id);else openDlCats.delete(id);const chev=el.previousElementSibling.querySelector('.dlc-chev');if(chev)chev.style.transform=open?'rotate(180deg)':'';};
// ── 사업장 · 매니저 관리 ──
const MEALS4=['조식','중식','석식','야식'];
const DAYS3=['평일','토요일','일요일'];
let addSiteOpen=false, editSite=null, siteSearch='', siteListOpen=false, menuViewPeriod=null, menuViewSearch='';
function siteManagerObj(site){return MANAGERS.find(x=>(x.sites||[]).includes(site))||null;}
function siteManager(site){const m=siteManagerObj(site);return m?m.name:'';}
function mgrLabel(m){return m?m.name+(m.phone?' · '+m.phone:''):'';}
function reassignSite(site,newName,newPhone){
  MANAGERS.forEach(m=>{m.sites=(m.sites||[]).filter(s=>s!==site);});
  let m=MANAGERS.find(x=>x.name===newName&&(x.phone||'')===(newPhone||''));
  if(!m){m={name:newName,phone:newPhone||'',sites:[]};MANAGERS.push(m);}
  if(!m.sites.includes(site))m.sites.push(site);
}
function renameSite(oldN,newN){
  if(oldN===newN)return;
  SITE_MEALS[newN]=SITE_MEALS[oldN];delete SITE_MEALS[oldN];
  MANAGERS.forEach(m=>{m.sites=m.sites.map(s=>s===oldN?newN:s);});
}
function deleteSite(name){delete SITE_MEALS[name];MANAGERS.forEach(m=>{m.sites=m.sites.filter(s=>s!==name);});}
function mealCheckHtml(prefix,meals){
  return DAYS3.map(day=>{
    const sel=(meals&&meals[day])||[];
    return `<div class="meal-day"><span class="md-label">${day}</span>`+
      MEALS4.map(m=>`<label class="md-chip"><input type="checkbox" data-day="${day}" value="${m}" ${sel.includes(m)?'checked':''}/>${m}</label>`).join('')+`</div>`;
  }).join('');
}
function readMeals(containerId){
  const meals={};DAYS3.forEach(d=>meals[d]=[]);
  document.querySelectorAll('#'+containerId+' input[type=checkbox]:checked').forEach(cb=>{meals[cb.dataset.day].push(cb.value);});
  return meals;
}
function esc(s){return String(s).replace(/'/g,"\\'");}
function siteListHtml(){
  const q=(siteSearch||'').trim().toLowerCase();
  const all=Object.keys(SITE_MEALS).sort((a,b)=>a.localeCompare(b,'ko'));
  const sites=q?all.filter(s=>s.toLowerCase().includes(q)||(siteManager(s)||'').toLowerCase().includes(q)):all;
  if(!sites.length)return `<div class="empty">검색 결과가 없습니다</div>`;
  return sites.map(site=>{
    const curMgr=siteManagerObj(site),editing=editSite===site;
    let row=`<div class="sm-row">
      <div class="sm-top"><span class="sm-name">${site}</span>
        <div class="sm-actions"><button class="btn-secondary btnxs" onclick="toggleEditSite('${esc(site)}')"><i class="ti ti-edit"></i></button><button class="btn-secondary btnxs" onclick="removeSiteUI('${esc(site)}')"><i class="ti ti-trash"></i></button></div></div>
      <div class="sm-mgr"><span>담당</span><select onchange="reassignSiteUI('${esc(site)}',this.value)">${[...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>`<option value="${mgrKey(m).replace(/"/g,'&quot;')}"${curMgr&&mgrKey(m)===mgrKey(curMgr)?' selected':''}>${mgrLabel(m)}</option>`).join('')}</select></div>`;
    if(editing){
      row+=`<div class="sm-edit"><input type="text" id="es-name" value="${site}"/><div class="sm-meals" id="es-meals">${mealCheckHtml('es',SITE_MEALS[site])}</div><div style="display:flex;gap:8px;"><button class="btn-secondary" style="flex:1;" onclick="toggleEditSite('${esc(site)}')">취소</button><button class="btn-primary" style="flex:1;" onclick="commitEditSite('${esc(site)}')">저장</button></div></div>`;
    }
    return row+`</div>`;
  }).join('');
}
function renderSiteList(){const box=$('sm-list');if(box)box.innerHTML=siteListHtml();}
function renderSiteSummary(){
  const all=Object.keys(SITE_MEALS).length;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;">
    <div style="font-size:13px;">사업장 <b>${all}</b>곳 · 영양사 <b>${MANAGERS.length}</b>명</div>
    <button class="btn-secondary" onclick="toggleAddSite()"><i class="ti ti-plus"></i> 사업장 추가</button></div>`;
  if(addSiteOpen){
    html+=`<div class="sm-edit" style="border-top:none;padding-top:0;margin-bottom:10px;">
      <input type="text" id="as-name" placeholder="사업장명"/>
      <input type="text" id="as-mgr" list="mgr-list" placeholder="담당 영양사 이름"/>
      <input type="text" id="as-mgr-phone" placeholder="담당 영양사 전화번호"/>
      <datalist id="mgr-list">${MANAGERS.map(m=>`<option value="${m.name}"></option>`).join('')}</datalist>
      <div class="sm-meals" id="as-meals">${mealCheckHtml('as',null)}</div>
      <div style="display:flex;gap:8px;"><button class="btn-secondary" style="flex:1;" onclick="toggleAddSite()">취소</button><button class="btn-primary" style="flex:1;" onclick="commitAddSite()">추가</button></div>
    </div>`;
  }
  html+=`<button class="list-toggle" onclick="toggleSiteList()"><span><i class="ti ti-list-details"></i> 사업장 목록 (${all}곳)</span><i class="ti ti-chevron-${siteListOpen?'up':'down'}"></i></button>`;
  if(siteListOpen){
    html+=`<div class="search-row" style="margin-top:10px;"><i class="ti ti-search"></i><input type="text" id="site-search" placeholder="사업장 · 영양사 이름 검색" value="${esc(siteSearch||'')}" oninput="onSiteSearch(this.value)"/><button class="search-x" onclick="$('site-search').value='';onSiteSearch('')"><i class="ti ti-x"></i></button></div>`;
    html+=`<div id="sm-list">${siteListHtml()}</div>`;
  }
  html+=`<button class="btn-primary" style="width:100%;margin-top:14px;" onclick="saveSiteConfig()"><i class="ti ti-device-floppy"></i> 변경사항 저장</button>
    <div class="sub-hint" style="margin-top:6px;">사업장·영양사 변경 내용을 모든 기기에 반영하려면 저장을 눌러주세요.</div>`;
  $('site-summary').innerHTML=html;
}
window.toggleSiteList=function(){siteListOpen=!siteListOpen;renderSiteSummary();};
window.onSiteSearch=function(v){siteSearch=v;renderSiteList();};
window.toggleAddSite=function(){addSiteOpen=!addSiteOpen;editSite=null;renderSiteSummary();};
window.toggleEditSite=function(s){editSite=editSite===s?null:s;addSiteOpen=false;renderSiteSummary();};
window.commitAddSite=function(){
  const name=$('as-name').value.trim(),mgr=$('as-mgr').value.trim(),mgrPhone=$('as-mgr-phone').value.trim();
  if(!name){toast('사업장명을 입력하세요',true);return;}
  if(SITE_MEALS[name]){toast('이미 있는 사업장입니다',true);return;}
  if(!mgr){toast('담당 영양사 이름을 입력하세요',true);return;}
  SITE_MEALS[name]=readMeals('as-meals');reassignSite(name,mgr,mgrPhone);
  addSiteOpen=false;siteListOpen=true;refreshManagerDropdown();renderSiteSummary();toast('추가됨 — 아래 "변경사항 저장"을 눌러 반영하세요');
};
window.commitEditSite=function(old){
  const newName=$('es-name').value.trim();if(!newName){toast('사업장명을 입력하세요',true);return;}
  if(newName!==old&&SITE_MEALS[newName]){toast('이미 있는 사업장명입니다',true);return;}
  const meals=readMeals('es-meals');
  if(newName!==old)renameSite(old,newName);
  SITE_MEALS[newName]=meals;editSite=null;renderSiteSummary();toast('수정됨 — 아래 "서버 저장"을 눌러 반영하세요');
};
window.removeSiteUI=function(s){if(!confirm(s+' 사업장을 삭제할까요?'))return;deleteSite(s);refreshManagerDropdown();renderSiteSummary();toast('삭제됨 — 아래 "서버 저장"을 눌러 반영하세요');};
window.reassignSiteUI=function(s,key){const m=MANAGERS.find(x=>mgrKey(x)===key);if(!m)return;reassignSite(s,m.name,m.phone);renderSiteSummary();toast(s+' 담당 → '+mgrLabel(m)+' (저장 필요)');};
window.saveSiteConfig=async function(){
  showLoading('저장 중...');
  try{
    await setDoc(doc(db,'config','settings'),{managers:MANAGERS,siteMeals:SITE_MEALS,updatedAt:new Date().toISOString()});
    refreshManagerDropdown();hideLoading();toast('서버에 저장되었습니다');
  }catch(e){hideLoading();toast('저장 실패: '+e.message,true);}
};
function refreshManagerDropdown(){
  const mSel=$('manager-select');const cur=mSel.value;
  mSel.innerHTML='<option value="">이름 선택</option>';
  [...MANAGERS].sort((a,b)=>a.name.localeCompare(b.name,'ko')).forEach(m=>mSel.appendChild(new Option(m.name+(m.phone?' · '+m.phone:''),mgrKey(m))));
  if(MANAGERS.find(m=>mgrKey(m)===cur))mSel.value=cur;
}

window.openModal=function(url){$('modal-img').src=url;$('modal').classList.add('open');};
</script>

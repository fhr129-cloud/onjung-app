<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보존식 설정 내보내기</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;max-width:720px;margin:0 auto;padding:1.5rem;color:#1a1a1a;line-height:1.5;}
h1{font-size:18px;}
.info{font-size:14px;color:#555;margin:8px 0 16px;}
button{padding:12px 18px;font-size:15px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:10px;cursor:pointer;}
textarea{width:100%;height:320px;margin-top:12px;font-family:monospace;font-size:12px;border:1px solid #ddd;border-radius:10px;padding:12px;box-sizing:border-box;}
.status{font-size:14px;margin:12px 0;font-weight:500;}
.ok{color:#0F6E56;} .err{color:#c00;}
</style>
</head>
<body>
<h1>보존식 설정 내보내기</h1>
<div class="info">기존 보존식 프로젝트(bozon-sik)의 현재 매니저·사업장 설정을 읽어옵니다. <b>읽기만 하며 데이터는 절대 변경하지 않습니다.</b></div>
<div class="status" id="status">불러오는 중...</div>
<button id="copyBtn" onclick="copyJson()" style="display:none;">아래 내용 전체 복사</button>
<textarea id="out" readonly></textarea>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
const cfg={apiKey:"AIzaSyCvFuJZ6hraxohPnvtAbhvBanXzXf8VE-E",authDomain:"bozon-sik.firebaseapp.com",projectId:"bozon-sik",storageBucket:"bozon-sik.firebasestorage.app",messagingSenderId:"350003291657",appId:"1:350003291657:web:9ef438cc880002c11ffad8"};
const db=getFirestore(initializeApp(cfg));
const st=document.getElementById('status'),out=document.getElementById('out'),btn=document.getElementById('copyBtn');
try{
  const snap=await getDoc(doc(db,'config','settings'));
  if(!snap.exists()){st.textContent='config/settings 문서가 없습니다.';st.className='status err';}
  else{
    const d=snap.data();
    const data={managers:d.managers||[],siteMeals:d.siteMeals||{}};
    out.value=JSON.stringify(data,null,2);
    st.textContent=`불러오기 완료 — 매니저 ${data.managers.length}명 · 사업장 ${Object.keys(data.siteMeals).length}곳`;
    st.className='status ok';btn.style.display='inline-block';
  }
}catch(e){st.textContent='오류: '+e.message;st.className='status err';}
window.copyJson=()=>{out.select();navigator.clipboard.writeText(out.value);btn.textContent='복사됨!';setTimeout(()=>btn.textContent='아래 내용 전체 복사',1500);};
</script>
</body>
</html>
